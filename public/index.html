<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caser Profile</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --accent: #007aff; --bg: #0b0b0b; --card: #1c1c1e; --text: #ffffff; --green: #34c759; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        .app { padding: 20px; }
        
        /* Шапка профиля */
        .profile-header {
            background: linear-gradient(180deg, rgba(52, 199, 89, 0.1) 0%, rgba(0, 0, 0, 0) 100%);
            border-radius: 28px; padding: 30px 20px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 20px;
        }
        .avatar { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--green); margin-bottom: 10px; }
        #ton-connect-btn { display: flex; justify-content: center; margin: 15px 0; }

        /* Та самая зеленая кнопка */
        .deposit-btn {
            background: var(--green); color: white; border: none; border-radius: 18px;
            width: 100%; padding: 16px; font-size: 16px; font-weight: 700;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.2s; cursor: pointer;
        }
        .deposit-btn:active { transform: scale(0.97); opacity: 0.9; }

        /* Модальное окно выбора */
        .modal {
            display: none; position: fixed; bottom: 0; left: 0; right: 0; top: 0;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 100;
        }
        .modal-content {
            position: absolute; bottom: 0; width: 100%; background: var(--card);
            border-radius: 30px 30px 0 0; padding: 30px 20px; box-sizing: border-box;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .pay-option {
            display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.05);
            padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05);
        }
        .pay-option img { width: 30px; height: 30px; }

        .inventory { background: var(--card); border-radius: 24px; padding: 20px; margin-top: 20px; }
        .slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .slot { aspect-ratio: 1/1; background: rgba(255,255,255,0.02); border: 1px dashed #3a3a3c; border-radius: 15px; }

        .close-modal { margin-top: 10px; color: #8e8e93; text-align: center; width: 100%; display: block; }
    </style>
</head>
<body>
    <div class="app">
        <div class="profile-header">
            <img src="" id="user-avatar" class="avatar">
            <div id="user-name" style="font-size: 20px; font-weight: 700;">@username</div>
            <div id="ton-connect-btn"></div>
        </div>

        <button class="deposit-btn" onclick="openDeposit()">
            <span>➕</span> Пополнить
        </button>

        <div class="inventory">
            <div style="font-weight:700;">Ваш инвентарь</div>
            <div class="slots">
                <div class="slot"></div><div class="slot"></div><div class="slot"></div>
                <div class="slot"></div><div class="slot"></div><div class="slot"></div>
            </div>
        </div>
    </div>

    <div id="deposit-modal" class="modal" onclick="closeDeposit(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin-top:0">Выберите способ</h3>
            
            <div class="pay-option" onclick="payTon()">
                <img src="https://cryptologos.cc/logos/toncoin-ton-logo.png">
                <div>
                    <div style="font-weight:600;">TON Coin</div>
                    <div style="font-size:12px; color:#8e8e93;">Прямой перевод (0.1 TON)</div>
                </div>
            </div>

            <div class="pay-option" onclick="payStars()">
                <img src="https://img.icons8.com/color/96/star--v1.png">
                <div>
                    <div style="font-weight:600;">Telegram Stars</div>
                    <div style="font-size:12px; color:#8e8e93;">Через нативный баннер</div>
                </div>
            </div>

            <a href="#" class="close-modal" onclick="closeDeposit(event)">Отмена</a>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ОБЯЗАТЕЛЬНО: Проверь, чтобы эта ссылка вела на твой RAW файл манифеста
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/casemonkbot-sudo/casemonk-bot/main/public/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        const user = tg.initDataUnsafe.user;
        if(user) {
            document.getElementById('user-name').innerText = user.username ? `@${user.username}` : user.first_name;
            document.getElementById('user-avatar').src = user.photo_url || 'https://ui-avatars.com/api/?name=U';
        }

        function openDeposit() {
            document.getElementById('deposit-modal').style.display = 'block';
            tg.HapticFeedback.impactOccurred('medium');
        }

        function closeDeposit(e) {
            document.getElementById('deposit-modal').style.display = 'none';
        }

        async function payTon() {
            if (!tonConnectUI.connected) {
                tg.showAlert("Сначала подключи кошелек!");
                return;
            }
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 300,
                messages: [{
                    address: "UQCZVO12gl7nNHEPgup58ZdlUJQIg7ANsuNIo73CYMaRyZzZ",
                    amount: "100000000" // 0.1 TON
                }]
            };
            try {
                await tonConnectUI.sendTransaction(transaction);
                tg.showAlert("Запрос в кошелек отправлен!");
                closeDeposit();
            } catch (e) { console.error(e); }
        }

        async function payStars() {
            const amount = prompt("Сколько звезд пополнить?", "50");
            if (!amount) return;
            
            // Здесь вызываешь свой бэкенд для создания ссылки
            // tg.openInvoice(link, callback...)
            tg.showAlert("Создание счета Stars...");
            closeDeposit();
        }
    </script>
</body>
</html>
