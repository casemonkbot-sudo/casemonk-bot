<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CaseMonk Final</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000; --glass: rgba(25, 25, 25, 0.75); --accent: #007aff; --border: 1px solid rgba(255,255,255,0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }

        /* HEADER */
        .header { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; z-index: 100; }
        .logo { font-size: 18px; font-weight: 900; color: rgba(255,255,255,0.3); letter-spacing: 1px; }
        .bal-chip { background: var(--glass); backdrop-filter: blur(20px); padding: 8px 16px; border-radius: 20px; border: var(--border); display: flex; align-items: center; gap: 8px; font-weight: 800; cursor: pointer; }

        .content { padding: 80px 20px 120px; height: 100vh; overflow-y: auto; display: none; }
        .content.active { display: block; }

        /* CASE MAIN */
        .case-card { width: 150px; background: linear-gradient(145deg, #151515, #050505); border-radius: 25px; padding: 20px; border: var(--border); }
        .case-card img { width: 90px; margin-bottom: 10px; }

        /* ROULETTE */
        .roulette-box { position: relative; width: 100%; height: 130px; background: #080808; border-radius: 24px; border: var(--border); overflow: hidden; margin: 20px 0; }
        .pointer { position: absolute; left: 50%; top: 0; width: 3px; height: 100%; background: var(--accent); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 15px var(--accent); }
        #track { display: flex; align-items: center; height: 100%; transition: transform 7s cubic-bezier(0.1, 0, 0.05, 1); }
        .slot { min-width: 110px; display: flex; justify-content: center; flex-shrink: 0; }
        .slot img { width: 80px; height: 80px; object-fit: contain; }

        /* WIN OVERLAY */
        #win-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .win-card { width: 85%; background: #0d0d0d; border-radius: 35px; padding: 35px; text-align: center; border: 2px solid var(--accent); }
        .win-card img { width: 150px; height: 150px; margin-bottom: 20px; }

        /* NAV */
        .nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: var(--glass); backdrop-filter: blur(25px); padding: 12px 35px; border-radius: 40px; border: var(--border); display: flex; gap: 40px; z-index: 100; }
        .nav-item { color: rgba(255,255,255,0.3); text-align: center; font-size: 10px; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }

        /* UTILS */
        .btn { width: 100%; background: var(--accent); color: #fff; border: none; padding: 18px; border-radius: 20px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-sec { background: #1c1c1e; border: var(--border); }
        .input-f { width: 100%; background: #0a0a0a; border: var(--border); padding: 16px; border-radius: 18px; color: #fff; margin-top: 10px; outline: none; }
        .modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; padding: 25px; }
        .modal.active { display: flex; }
    </style>
</head>
<body>

    <div id="win-overlay">
        <div class="win-card">
            <h1 id="t-win-h" style="margin-bottom:15px;">Ваш выигрыш!</h1>
            <img id="win-img" src="">
            <h2 id="win-name">Item</h2>
            <div id="win-price" style="color:var(--accent); font-size:24px; font-weight:900; margin:15px 0;"></div>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="flex:1;" id="b-sell" onclick="claim('sell')">Продать</button>
                <button class="btn btn-sec" style="flex:1;" id="b-keep" onclick="claim('keep')">Оставить</button>
            </div>
        </div>
    </div>

    <div class="header">
        <div class="logo">CASE MONK</div>
        <div class="bal-chip" onclick="openM('m-refill')">
            <img src="ton.png" width="18"> <span id="bal-val">0.00</span> <i class="fa-solid fa-plus-circle" style="color:var(--accent);"></i>
        </div>
    </div>

    <div id="p-cases" class="content active">
        <div id="case-list">
            <h2 style="margin-bottom:20px;" id="t-uniq">Уникальные</h2>
            <div class="case-card" onclick="openCaseView()">
                <img src="case_drop.png">
                <p style="font-weight:700;">DROP</p>
                <p style="color:var(--accent); font-weight:800;">10 <img src="ton.png" width="12"></p>
            </div>
        </div>
        <div id="case-view" style="display:none;">
            <div style="display:flex; align-items:center; margin-bottom:20px;">
                <i class="fa-solid fa-chevron-left" onclick="hideCaseView()" style="font-size:22px;"></i>
                <span style="margin-left:15px; font-weight:800; font-size:20px;">DROP</span>
            </div>
            <div class="roulette-box"><div class="pointer"></div><div id="track"></div></div>
            <button class="btn" id="b-open" onclick="spin(false)">ОТКРЫТЬ ЗА 10 <img src="ton.png" width="14"></button>
            <button class="btn btn-sec" id="b-demo" onclick="spin(true)">ДЕМО РЕЖИМ</button>
            <h4 style="margin:30px 0 15px; color:rgba(255,255,255,0.4);" id="t-cont">Содержимое:</h4>
            <div id="preview-grid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:12px;"></div>
        </div>
    </div>

    <div id="p-bonus" class="content">
        <h2 style="margin-bottom:20px;" id="t-bon">Бонусы</h2>
        <div style="background:var(--glass); border-radius:28px; padding:25px; border:var(--border);">
            <div style="display:flex; justify-content:space-between; margin-bottom:25px;">
                <div style="text-align:center; flex:1;">
                    <p style="color:rgba(255,255,255,0.5); font-size:12px;" id="t-fr">Друзей</p>
                    <p style="font-size:22px; font-weight:900;">0</p>
                </div>
                <div style="text-align:center; flex:1; border-left: var(--border);">
                    <p style="color:rgba(255,255,255,0.5); font-size:12px;" id="t-inc">Доход</p>
                    <p style="font-size:22px; font-weight:900; color:var(--accent);">0 <img src="ton.png" width="16"></p>
                </div>
            </div>
            <p style="font-size:13px; color:rgba(255,255,255,0.6); margin-bottom:20px; text-align:center;" id="t-minw">
                Вывести можно от 5 <img src="ton.png" width="10"> на игровой баланс.
            </p>
            <button class="btn" id="b-inv" onclick="invite()">Пригласить друга</button>
        </div>
    </div>

    <div id="p-profile" class="content">
        <div style="text-align:center; margin-bottom:30px;">
            <img id="u-pic" src="" style="width:85px; height:85px; border-radius:50%; border:2px solid var(--accent); margin-bottom:12px;">
            <h2 id="u-name">User</h2>
        </div>
        <div style="background:var(--glass); padding:20px; border-radius:25px; border:var(--border);">
            <h3 id="t-inv-h">Инвентарь</h3>
            <div id="inv-grid" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; margin-top:15px;"></div>
        </div>
        <h3 style="margin:20px 0 10px;" id="t-promo">Промокод</h3>
        <input type="text" id="promo-in" class="input-f" placeholder="...">
        <button class="btn btn-sec" id="b-promo" onclick="checkPromo()">Активировать</button>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn btn-sec" onclick="setLang('ru')">RU</button>
            <button class="btn btn-sec" onclick="setLang('en')">EN</button>
        </div>
        <button class="btn btn-sec" style="margin-top:10px;" id="b-sup" onclick="window.open('https://t.me/casemonk_sup_bot')">Поддержка</button>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="nav('cases', this)"><i class="fa-solid fa-shapes"></i><span id="n1">Кейсы</span></div>
        <div class="nav-item" onclick="nav('bonus', this)"><i class="fa-solid fa-gift"></i><span id="n2">Бонусы</span></div>
        <div class="nav-item" onclick="nav('profile', this)"><i class="fa-solid fa-user"></i><span id="n3">Профиль</span></div>
    </div>

    <div id="m-refill" class="modal">
        <div style="display:flex; align-items:center; margin-bottom:30px;"><i class="fa-solid fa-xmark" onclick="closeM('m-refill')"></i><span style="margin-left:20px; font-weight:800;" id="t-ref">Пополнение</span></div>
        <button class="btn btn-sec" style="display:flex; justify-content:space-between; margin-bottom:15px;" onclick="openM('m-ton')">TON <img src="ton.png" width="22"></button>
        <button class="btn btn-sec" style="display:flex; justify-content:space-between;" onclick="openM('m-gifts')">Gifts 🎁</button>
    </div>

    <div id="m-ton" class="modal">
        <div style="display:flex; align-items:center; margin-bottom:30px;"><i class="fa-solid fa-chevron-left" onclick="closeM('m-ton')"></i><span style="margin-left:20px; font-weight:800;">Wallet</span></div>
        <div id="ton-connect-btn" style="display:flex; justify-content:center; margin-bottom:20px;"></div>
        <div id="ton-pay" style="display:none;">
            <input type="number" id="t-amt" class="input-f" value="1.0" style="text-align:center; font-size:24px;">
            <button class="btn" id="b-pay" onclick="doPay()">Оплатить</button>
        </div>
    </div>

    <div id="m-gifts" class="modal">
        <div style="display:flex; align-items:center; margin-bottom:30px;"><i class="fa-solid fa-chevron-left" onclick="closeM('m-gifts')"></i><span style="margin-left:20px; font-weight:800;">Gifts</span></div>
        <div id="t-gifts-text" style="background:var(--glass); padding:20px; border-radius:20px; font-size:14px; line-height:1.6;"></div>
        <button class="btn" style="margin-top:20px;" id="b-go-g" onclick="window.open('https://t.me/casemonk_relayer')">Перейти</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let bal = 0, inventory = [], won = null, isDemo = false, lang = 'ru';

        const ITEMS = [
            { name: 'Nail Bracelet', price: 115.83, file: 'nailbracelet-1.png' },
            { name: 'Bonded Ring', price: 40.10, file: 'bondedring-1.png' },
            { name: 'Signet Ring', price: 32.69, file: 'signetring-1.png' },
            { name: 'Diamond Ring', price: 26.59, file: 'diamondring-1.png' },
            { name: 'Cupid Charm', price: 20.19, file: 'cupidcharm-1.png' },
            { name: 'Crystal Ball', price: 11.87, file: 'crystalball-1.png' },
            { name: 'Love Candle', price: 10.04, file: 'lovecandle-1.png' },
            { name: 'Jolly Chimp', price: 6.46, file: 'jollychimp-1.png' },
            { name: 'Light Sword', price: 5.40, file: 'lightsword-1.png' },
            { name: 'Snoop Dogg', price: 4.95, file: 'snoopdogg-1.png' }
        ];

        const STR = {
            ru: {
                uniq: "Уникальные", open: "ОТКРЫТЬ ЗА 10", demo: "ДЕМО РЕЖИМ", cont: "Содержимое:", 
                bon: "Бонусы", fr: "Друзей", inc: "Доход", minw: "Вывести можно от 5 на баланс.", invb: "Пригласить друга",
                invh: "Инвентарь", promo: "Промокод", bact: "Активировать", sup: "Поддержка", ref: "Пополнение",
                winh: "Ваш выигрыш!", sell: "Продать", keep: "Оставить", pay: "Оплатить", gog: "Перейти к @casemonk_relayer",
                n1: "Кейсы", n2: "Бонусы", n3: "Профиль",
                gtxt: "1. Перейдите в бота @casemonk_relayer<br>2. Отправьте NFT подарок<br>3. Баланс пополнится автоматически",
                m1: "Промокод успешно активирован!", m2: "Промокод закончился!", m3: "Промокод не существует"
            },
            en: {
                uniq: "Unique", open: "OPEN FOR 10", demo: "DEMO MODE", cont: "Contents:", 
                bon: "Bonuses", fr: "Friends", inc: "Income", minw: "Min withdraw 5 to balance.", invb: "Invite Friend",
                invh: "Inventory", promo: "Promo Code", bact: "Activate", sup: "Support", ref: "Top Up",
                winh: "You Won!", sell: "Sell", keep: "Keep", pay: "Pay", gog: "Go to @casemonk_relayer",
                n1: "Cases", n2: "Bonuses", n3: "Profile",
                gtxt: "1. Go to @casemonk_relayer<br>2. Send an NFT gift<br>3. Balance updates automatically",
                m1: "Promo activated!", m2: "Promo ended!", m3: "Promo not found"
            }
        };

        function setLang(l) {
            lang = l; const s = STR[l];
            document.getElementById('t-uniq').innerText = s.uniq;
            document.getElementById('b-open').innerHTML = `${s.open} <img src="ton.png" width="14">`;
            document.getElementById('b-demo').innerText = s.demo;
            document.getElementById('t-cont').innerText = s.cont;
            document.getElementById('t-bon').innerText = s.bon;
            document.getElementById('t-fr').innerText = s.fr;
            document.getElementById('t-inc').innerText = s.inc;
            document.getElementById('t-minw').innerHTML = s.minw.replace('5', '5 <img src="ton.png" width="10">');
            document.getElementById('b-inv').innerText = s.invb;
            document.getElementById('t-inv-h').innerText = s.invh;
            document.getElementById('t-promo').innerText = s.promo;
            document.getElementById('b-promo').innerText = s.bact;
            document.getElementById('b-sup').innerText = s.sup;
            document.getElementById('t-ref').innerText = s.ref;
            document.getElementById('t-win-h').innerText = s.winh;
            document.getElementById('b-sell').innerText = s.sell;
            document.getElementById('b-keep').innerText = s.keep;
            document.getElementById('b-pay').innerText = s.pay;
            document.getElementById('b-go-g').innerText = s.gog;
            document.getElementById('t-gifts-text').innerHTML = s.gtxt;
            document.getElementById('n1').innerText = s.n1;
            document.getElementById('n2').innerText = s.n2;
            document.getElementById('n3').innerText = s.n3;
        }

        const u = tg.initDataUnsafe.user;
        if(u) { document.getElementById('u-name').innerText = u.first_name; if(u.photo_url) document.getElementById('u-pic').src = u.photo_url; }

        function openCaseView() {
            document.getElementById('case-list').style.display='none'; document.getElementById('case-view').style.display='block';
            const g = document.getElementById('preview-grid'); g.innerHTML = '';
            ITEMS.forEach(i => { g.innerHTML += `<div style="background:var(--glass); padding:10px; border-radius:15px; text-align:center; border:var(--border);"><img src="${i.file}" style="width:45px;"><div style="font-size:10px; font-weight:800; color:var(--accent); margin-top:5px;">${i.price} <img src="ton.png" width="8"></div></div>`; });
        }
        function hideCaseView() { document.getElementById('case-list').style.display='block'; document.getElementById('case-view').style.display='none'; }

        let isSpinning = false;
        function spin(demo) {
            if(isSpinning) return;
            if(!demo && bal < 10) return tg.showAlert("Need 10 TON!");
            isSpinning = true; isDemo = demo; if(!demo) { bal -= 10; updateBal(); }
            const track = document.getElementById('track');
            track.style.transition = 'none'; track.style.transform = 'translateX(0)'; track.innerHTML = '';
            for(let i=0; i<60; i++) { const r = ITEMS[Math.floor(Math.random()*ITEMS.length)]; track.innerHTML += `<div class="slot"><img src="${r.file}"></div>`; }
            won = ITEMS[Math.floor(Math.random()*ITEMS.length)];
            track.children[50].innerHTML = `<img src="${won.file}">`;
            setTimeout(() => {
                track.style.transition = 'transform 7s cubic-bezier(0.1, 0, 0.05, 1)';
                track.style.transform = `translateX(-${(50*110) - (track.parentElement.offsetWidth/2) + 55}px)`;
            }, 50);
            setTimeout(() => {
                document.getElementById('win-img').src = won.file;
                document.getElementById('win-name').innerText = won.name;
                document.getElementById('win-price').innerHTML = won.price + ' <img src="ton.png" width="18">';
                document.getElementById('win-overlay').style.display = 'flex';
                isSpinning = false;
            }, 7200);
        }

        function claim(act) {
            if(!isDemo) { if(act === 'sell') { bal += won.price; updateBal(); } else { inventory.push(won); updateInv(); } }
            document.getElementById('win-overlay').style.display = 'none';
        }

        function checkPromo() {
            const v = document.getElementById('promo-in').value, s = STR[lang];
            if(v === "CASE") tg.showAlert(s.m1); else if(v === "END") tg.showAlert(s.m2); else tg.showAlert(s.m3);
        }

        function invite() {
            const l = `https://t.me/casemonk_robot?start=${u?u.id:''}`;
            const t = `CaseMonk - выигрывай дорогие подарки уже сейчас, за приглашение друзей которые сделают депозит получай 15% от их пополнений, и выбивай свой подарок🎁\n\n${l}`;
            window.open("https://t.me/share/url?url=" + encodeURIComponent(t));
        }

        function updateBal() { document.getElementById('bal-val').innerText = bal.toFixed(2); }
        function updateInv() {
            const g = document.getElementById('inv-grid'); g.innerHTML = '';
            inventory.forEach((i, idx) => { g.innerHTML += `<div style="aspect-ratio:1; background:var(--glass); border-radius:18px; border:var(--border); display:flex; align-items:center; justify-content:center;" onclick="manageItem(${idx})"><img src="${i.file}" style="width:75%;"></div>`; });
        }
        function manageItem(idx) {
            const i = inventory[idx];
            tg.showConfirm(`${i.name} (${i.price} TON)\nSell or Withdraw?`, (ok) => {
                if(ok) { bal += i.price; inventory.splice(idx,1); updateInv(); updateBal(); }
                else { tg.showAlert("Request created!"); }
            });
        }

        function nav(p, el) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
            document.getElementById('p-' + p).classList.add('active'); el.classList.add('active');
        }
        function openM(id) { document.getElementById(id).classList.add('active'); }
        function closeM(id) { document.getElementById(id).classList.remove('active'); }

        const tonConnect = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://casemonk-bot-akm8.onrender.com/tonconnect-manifest.json', buttonRootId: 'ton-connect-btn' });
        tonConnect.onStatusChange(w => { document.getElementById('ton-pay').style.display = w ? 'block' : 'none'; });
        async function doPay() {
            const a = document.getElementById('t-amt').value; if(a < 0.1 || a > 9999) return tg.showAlert("Error sum");
            const tx = { validUntil: Math.floor(Date.now()/1000)+60, messages: [{ address: "UQCZVO12gl7nNHEPgup58ZdlUJQIg7ANsuNIo73CYMaRyZzZ", amount: (a*1e9).toString() }] };
            try { await tonConnect.sendTransaction(tx); tg.showAlert("Success!"); } catch(e){}
        }

        setLang('ru'); updateBal();
    </script>
</body>
</html>
