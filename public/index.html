<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CaseMonk Final</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000; --glass: rgba(25, 25, 30, 0.8); --accent: #007aff; --border: 1px solid rgba(255,255,255,0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }

        /* HEADER */
        .header { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; z-index: 100; }
        .logo { font-size: 18px; font-weight: 900; color: rgba(255,255,255,0.3); letter-spacing: 1px; }
        .bal-chip { background: var(--glass); backdrop-filter: blur(20px); padding: 8px 16px; border-radius: 20px; border: var(--border); display: flex; align-items: center; gap: 8px; font-weight: 800; }

        .content { padding: 80px 20px 120px; height: 100vh; overflow-y: auto; display: none; }
        .content.active { display: block; }

        /* ROULETTE */
        .roulette-box { position: relative; width: 100%; height: 140px; background: #080808; border-radius: 24px; border: var(--border); overflow: hidden; margin: 20px 0; }
        .pointer { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: #fff; z-index: 10; transform: translateX(-50%); box-shadow: 0 0 10px #fff; }
        #track { display: flex; align-items: center; height: 100%; transition: transform 7s cubic-bezier(0.1, 0, 0.05, 1); }
        .slot { min-width: 110px; display: flex; justify-content: center; flex-shrink: 0; }
        .slot img { width: 80px; height: 80px; object-fit: contain; }

        /* GRID SYSTEM */
        .case-card { width: 155px; background: linear-gradient(145deg, #151515, #050505); border-radius: 26px; padding: 20px; border: var(--border); }
        .case-card img { width: 95px; margin-bottom: 12px; }
        
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .grid-item { aspect-ratio: 1; background: var(--glass); border-radius: 18px; border: var(--border); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .grid-item img { width: 75%; }

        /* MODALS */
        .modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; padding: 25px; }
        .modal.active { display: flex; }

        /* NAV */
        .nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: var(--glass); backdrop-filter: blur(30px); padding: 12px 35px; border-radius: 40px; border: var(--border); display: flex; gap: 40px; z-index: 100; }
        .nav-item { color: rgba(255,255,255,0.3); text-align: center; font-size: 10px; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }

        .btn { width: 100%; background: var(--accent); color: #fff; border: none; padding: 18px; border-radius: 20px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-sec { background: #1a1a1c; border: var(--border); }
        
        .ton-icon { width: 14px; vertical-align: middle; margin-bottom: 2px; }
        .ton-icon-small { width: 12px; vertical-align: middle; margin-left: 4px; margin-bottom: 1px; }
    </style>
</head>
<body>

    <div id="win-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; display:none; align-items:center; justify-content:center; backdrop-filter:blur(15px);">
        <div style="width:85%; background:#0a0a0a; border-radius:35px; padding:35px; text-align:center; border:2px solid var(--accent);">
            <h1 id="t-win" style="margin-bottom:15px;">Ваш выигрыш!</h1>
            <img id="win-img" src="" style="width:150px; margin-bottom:20px;">
            <h2 id="win-name">Item</h2>
            <div id="win-price" style="color:var(--accent); font-size:24px; font-weight:900; margin:15px 0;"></div>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="flex:1;" onclick="claim('sell')" id="b-sell">Продать</button>
                <button class="btn btn-sec" style="flex:1;" onclick="claim('keep')" id="b-keep">Оставить</button>
            </div>
        </div>
    </div>

    <div class="header">
        <div class="logo">CASE MONK</div>
        <div class="bal-chip">
            <img src="https://cryptologos.cc/logos/toncoin-ton-logo.png" class="ton-icon"> <span id="bal-val">100.00</span>
        </div>
    </div>

    <div id="p-cases" class="content active">
        <div id="case-list">
            <h2 style="margin-bottom:20px;">Уникальные</h2>
            <div class="case-card" onclick="openCaseView()">
                <img src="case_drop.png">
                <div style="display: flex; align-items: center; justify-content: space-between;">
                   <span style="font-weight:700;">DROP <img src="https://cryptologos.cc/logos/toncoin-ton-logo.png" class="ton-icon-small"></span>
                   <span style="color:var(--accent); font-weight:800; font-size: 14px;">10</span>
                </div>
            </div>
        </div>

        <div id="case-view" style="display:none;">
            <div style="display:flex; align-items:center; margin-bottom:20px;">
                <i class="fa-solid fa-chevron-left" onclick="hideCaseView()" style="font-size:22px;"></i>
                <span style="margin-left:15px; font-weight:800; font-size:20px;">Кейс DROP</span>
            </div>
            <div class="roulette-box"><div class="pointer"></div><div id="track"></div></div>
            <button class="btn" id="b-open" onclick="spin(false)">ОТКРЫТЬ ЗА 10 <img src="https://cryptologos.cc/logos/toncoin-ton-logo.png" class="ton-icon"></button>
            <button class="btn btn-sec" id="b-demo" onclick="spin(true)">ДЕМО РЕЖИМ</button>
            <div id="preview-grid" class="grid-container"></div>
        </div>
    </div>

    <div id="p-profile" class="content">
        <div style="text-align:center; margin-bottom:30px;">
            <img id="u-pic" src="" style="width:85px; height:85px; border-radius:50%; border:2px solid var(--accent); margin-bottom:10px;">
            <h2 id="u-name">User</h2>
        </div>
        <div style="background:var(--glass); padding:20px; border-radius:28px; border:var(--border);">
            <h3>Инвентарь</h3>
            <div id="inv-grid" class="grid-container"></div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="nav('cases', this)"><i class="fa-solid fa-shapes"></i><span>Кейсы</span></div>
        <div class="nav-item" onclick="nav('profile', this)"><i class="fa-solid fa-user"></i><span>Профиль</span></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let bal = 100.00; // Стартовый баланс для пробы
        let inventory = [], wonItem = null, isDemo = false;

        const ITEMS = [
            { name: 'Nail Bracelet', price: 115.83, file: 'nailbracelet-1.png' },
            { name: 'Bonded Ring', price: 40.10, file: 'bondedring-1.png' },
            { name: 'Signet Ring', price: 32.69, file: 'signetring-1.png' },
            { name: 'Diamond Ring', price: 26.59, file: 'diamondring-1.png' }
        ];

        function openCaseView() {
            document.getElementById('case-list').style.display='none'; 
            document.getElementById('case-view').style.display='block';
            const track = document.getElementById('track');
            track.innerHTML = '';
            for(let i=0; i<60; i++) { 
                const r = ITEMS[Math.floor(Math.random()*ITEMS.length)]; 
                track.innerHTML += `<div class="slot"><img src="${r.file}"></div>`; 
            }
        }

        function hideCaseView() { document.getElementById('case-list').style.display='block'; document.getElementById('case-view').style.display='none'; }

        function spin(demo) {
            if(bal < 10 && !demo) return alert("Недостаточно TON");
            if(!demo) { bal -= 10; updateBal(); }
            const track = document.getElementById('track');
            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';
            wonItem = ITEMS[Math.floor(Math.random()*ITEMS.length)];
            track.children[50].innerHTML = `<img src="${wonItem.file}">`;
            setTimeout(() => {
                track.style.transition = 'transform 7s cubic-bezier(0.1, 0, 0.05, 1)';
                track.style.transform = `translateX(-${(50*110) - (track.parentElement.offsetWidth/2) + 55}px)`;
            }, 50);
            setTimeout(() => {
                document.getElementById('win-img').src = wonItem.file;
                document.getElementById('win-price').innerText = wonItem.price + ' TON';
                document.getElementById('win-overlay').style.display = 'flex';
            }, 7200);
        }

        function claim(act) {
            if(act === 'sell') { bal += wonItem.price; updateBal(); }
            document.getElementById('win-overlay').style.display = 'none';
        }

        function updateBal() { document.getElementById('bal-val').innerText = bal.toFixed(2); }

        function nav(p, el) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
            document.getElementById('p-' + p).classList.add('active'); el.classList.add('active');
        }
    </script>
</body>
</html>
