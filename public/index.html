<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CaseMonk</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --card: #0a0a0a;
            --accent-blue: #007aff;
            --accent-green: #34c759;
            --text-sec: #8e8e93;
            --glass: rgba(255, 255, 255, 0.05);
            --border: 1px solid rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* Шапка */
        .header {
            display: flex; justify-content: flex-end;
            padding: 15px 20px; position: fixed; top: 0; width: 100%; z-index: 50;
        }
        .balance-chip {
            background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(15px);
            padding: 8px 14px; border-radius: 22px; border: var(--border);
            display: flex; align-items: center; gap: 8px;
        }

        /* Контент */
        .main {
            padding: 70px 20px 120px; height: 100vh; overflow-y: auto;
            display: flex; flex-direction: column; align-items: center;
        }

        .avatar-glow {
            width: 100px; height: 100px; border-radius: 50%;
            background: linear-gradient(180deg, var(--accent-green), transparent);
            padding: 3px; margin-bottom: 12px;
        }
        .avatar-glow img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid #000; object-fit: cover; }
        .username { font-size: 22px; font-weight: 700; margin-bottom: 5px; }
        .user-tag { color: var(--text-sec); font-size: 14px; margin-bottom: 20px; }

        .btn-full {
            width: 100%; max-width: 100%; background: var(--accent-blue);
            color: #fff; border: none; padding: 16px; border-radius: 16px;
            font-size: 16px; font-weight: 600; display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        /* Переключатель языка */
        .lang-switcher {
            margin-top: 15px; display: flex; background: #111; padding: 4px; border-radius: 12px; border: var(--border);
        }
        .lang-opt {
            padding: 6px 15px; border-radius: 9px; font-size: 12px; cursor: pointer; color: var(--text-sec); transition: 0.2s;
        }
        .lang-opt.active { background: var(--accent-blue); color: #fff; }

        /* Инвентарь */
        .inv-box { background: var(--card); width: 100%; border-radius: 20px; padding: 18px; border: var(--border); margin-top: 25px; }
        .inv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .slot { aspect-ratio: 1; background: #121212; border-radius: 12px; border: 1px dashed #222; }

        /* Навигация "Жидкое стекло" */
        .glass-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 10px 40px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .glass-nav i { font-size: 20px; color: #fff; }
        .glass-nav span { font-size: 11px; font-weight: 500; }

        /* Модалки */
        .modal { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; padding: 20px; }
        .modal.active { display: flex; animation: slideUp 0.3s cubic-bezier(0.1, 0.7, 0.1, 1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .m-head { display: flex; align-items: center; height: 50px; font-size: 18px; font-weight: 600; margin-bottom: 20px; }
        .back { margin-right: 15px; font-size: 20px; cursor: pointer; }

        .item-row {
            background: #111; padding: 18px; border-radius: 16px; border: var(--border);
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
        }

        input {
            width: 100%; background: #111; border: var(--border); padding: 16px; border-radius: 14px;
            color: #fff; font-size: 18px; text-align: center; margin: 20px 0;
        }

        .alert-box {
            background: rgba(255, 59, 48, 0.1); color: #ff3b30; padding: 15px; border-radius: 14px;
            font-size: 13px; text-align: center; margin-top: auto; margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-chip" onclick="openM('m-sel')">
            <img src="https://cryptologos.cc/logos/toncoin-ton-logo.png" width="18">
            <span>0.00</span>
            <i class="fa-solid fa-plus-circle" style="color: var(--accent-blue); margin-left: 5px;"></i>
        </div>
    </div>

    <div class="main">
        <div class="avatar-glow"><img id="u-photo" src=""></div>
        <div class="username" id="u-name">User</div>
        <div class="user-tag" id="u-tag">@username</div>

        <button class="btn-full" onclick="window.open('https://t.me/casemonk_sup_robot')">
            <i class="fa-solid fa-headset"></i> <span data-ru="Поддержка" data-en="Support">Поддержка</span>
        </button>

        <div class="lang-switcher">
            <div class="lang-opt active" onclick="setL('ru', this)">Русский</div>
            <div class="lang-opt" onclick="setL('en', this)">English</div>
        </div>

        <div class="inv-box">
            <div style="display:flex; justify-content:space-between; font-size:14px;">
                <b data-ru="Инвентарь" data-en="Inventory">Инвентарь</b>
                <span style="color:var(--text-sec)" data-ru="0 предметов" data-en="0 items">0 предметов</span>
            </div>
            <div class="inv-grid">
                <div class="slot"></div><div class="slot"></div><div class="slot"></div>
                <div class="slot"></div><div class="slot"></div><div class="slot"></div>
            </div>
        </div>
    </div>

    <div class="glass-nav">
        <i class="fa-solid fa-circle-user"></i>
        <span data-ru="Профиль" data-en="Profile">Профиль</span>
    </div>

    <div id="m-sel" class="modal">
        <div class="m-head"><i class="fa-solid fa-chevron-left back" onclick="closeM('m-sel')"></i> <span data-ru="Пополнение" data-en="Deposit">Пополнение</span></div>
        <div class="item-row" onclick="openM('m-ton')"><span>TON</span> <img src="https://cryptologos.cc/logos/toncoin-ton-logo.png" width="22"></div>
        <div class="item-row" onclick="openM('m-gift')"><span>Gifts 🎁</span></div>
    </div>

    <div id="m-ton" class="modal">
        <div class="m-head"><i class="fa-solid fa-chevron-left back" onclick="closeM('m-ton')"></i> TON</div>
        <div id="ton-connect-btn" style="margin: 20px auto;"></div>
        <div id="pay-ui" style="display:none;">
            <input type="number" id="t-val" value="0.1">
            <button class="btn-full" onclick="sendT()" data-ru="Пополнить" data-en="Deposit">Пополнить</button>
            <button class="btn-full" style="background:none; color:#ff3b30; margin-top:10px;" onclick="tonConnect.disconnect()">Disconnect</button>
        </div>
    </div>

    <div id="m-gift" class="modal">
        <div class="m-head"><i class="fa-solid fa-chevron-left back" onclick="closeM('m-gift')"></i> Gifts 🎁</div>
        <p style="margin-bottom:20px;">1. <span data-ru="Перейдите в нашего бота" data-en="Go to our bot">Перейдите в нашего бота</span> <b>@casemonk_relayer</b></p>
        <p style="margin-bottom:20px;">2. <span data-ru="Отправьте ему NFT подарок" data-en="Send him an NFT gift">Отправьте ему NFT подарок</span></p>
        <p style="margin-bottom:30px;">3. <span data-ru="Баланс пополнится мгновенно" data-en="Balance will update instantly">Баланс пополнится мгновенно</span></p>
        <div class="alert-box" data-ru="Отправляйте подарки только напрямую!" data-en="Send gifts only directly!">Отправляйте подарки только напрямую!</div>
        <button class="btn-full" onclick="window.open('https://t.me/casemonk_relayer')" data-ru="Перейти" data-en="Go to bot">Перейти</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Данные юзера
        const u = tg.initDataUnsafe.user;
        if(u) {
            document.getElementById('u-name').innerText = u.first_name + (u.last_name ? ' ' + u.last_name : '');
            document.getElementById('u-tag').innerText = '@' + (u.username || 'user');
            if(u.photo_url) document.getElementById('u-photo').src = u.photo_url;
        }

        function openM(id){ document.getElementById(id).classList.add('active'); tg.HapticFeedback.impactOccurred('medium'); }
        function closeM(id){ document.getElementById(id).classList.remove('active'); }

        // Язык
        function setL(l, b){
            document.querySelectorAll('[data-ru]').forEach(el => {
                el.innerText = l === 'ru' ? el.dataset.ru : el.dataset.en;
            });
            document.querySelectorAll('.lang-opt').forEach(opt => opt.classList.remove('active'));
            b.classList.add('active');
            tg.HapticFeedback.selectionChanged();
        }

        // TON
        const tonConnect = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://casemonk-bot-akm8.onrender.com/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        tonConnect.onStatusChange(w => {
            document.getElementById('pay-ui').style.display = w ? 'block' : 'none';
            document.getElementById('ton-connect-btn').style.display = w ? 'none' : 'flex';
        });

        async function sendT(){
            const v = document.getElementById('t-val').value;
            const tx = { validUntil: Math.floor(Date.now()/1000)+60, messages: [{ address: "UQCZVO12gl7nNHEPgup58ZdlUJQIg7ANsuNIo73CYMaRyZzZ", amount: (v*1e9).toString() }] };
            try { await tonConnect.sendTransaction(tx); } catch(e){}
        }
    </script>
</body>
</html>
