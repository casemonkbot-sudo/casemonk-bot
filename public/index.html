<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caser Profile</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent: #007aff;
            --bg: #0b0b0b;
            --card: #1c1c1e;
            --text: #ffffff;
            --sub-text: #8e8e93;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg); color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 0; height: 100vh; overflow-y: auto;
        }

        .profile-container { padding: 20px; }

        /* HEADER CARD */
        .profile-card {
            text-align: center; padding: 40px 20px;
            background: linear-gradient(180deg, rgba(28, 28, 30, 0.6) 0%, rgba(11, 11, 11, 0) 100%);
            border-radius: 28px; margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .avatar-big {
            width: 110px; height: 110px; border-radius: 50%;
            border: 3px solid var(--accent); margin-bottom: 15px;
            box-shadow: 0 0 30px rgba(0, 122, 255, 0.2);
            object-fit: cover;
        }
        .username { font-size: 24px; font-weight: 800; margin-bottom: 15px; }

        /* SUPPORT BUTTON */
        .support-btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(0, 122, 255, 0.1); color: var(--accent);
            padding: 10px 20px; border-radius: 12px;
            text-decoration: none; font-size: 14px; font-weight: 600;
            border: 1px solid rgba(0, 122, 255, 0.2);
        }

        /* ACTIONS */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .btn {
            padding: 16px; border-radius: 16px; border: none;
            font-weight: 700; font-size: 16px; transition: 0.2s;
        }
        .btn-blue { background: var(--accent); color: white; }
        .btn-gray { background: var(--card); color: white; border: 1px solid #333; }
        .btn:active { transform: scale(0.97); }

        /* INVENTORY */
        .inventory-section { background: var(--card); border-radius: 24px; padding: 20px; }
        .inventory-head { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .inventory-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .slot {
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px dashed #3a3a3c;
            aspect-ratio: 1/1.1; border-radius: 18px;
            position: relative;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="profile-card">
            <img src="" id="u-avatar" class="avatar-big" alt="👤">
            <div id="u-nick" class="username">@USER</div>
            
            <a href="https://t.me/casemonk_sup_robot" class="support-btn">
                🎧 Поддержка
            </a>
        </div>

        <div class="action-grid">
            <button class="btn btn-blue">Пополнить</button>
            <button class="btn btn-gray">Вывести</button>
        </div>

        <div class="inventory-section">
            <div class="inventory-head">
                <span style="font-weight: 700; font-size: 18px;">Ваши подарки</span>
                <span style="color: var(--sub-text); font-size: 14px;">Продать всё</span>
            </div>
            <div class="inventory-grid">
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Данные из Telegram
        const user = tg.initDataUnsafe.user;
        if(user) {
            const nickElement = document.getElementById('u-nick');
            const avatarElement = document.getElementById('u-avatar');
            
            // Ник с @
            nickElement.innerText = user.username ? `@${user.username}` : user.first_name;
            
            // Аватарка
            if(user.photo_url) {
                avatarElement.src = user.photo_url;
            } else {
                avatarElement.style.display = 'none'; // Скрыть если нет фото
            }
        }

        // Кнопки для фидбека
        document.querySelectorAll('.btn').forEach(button => {
            button.addEventListener('click', () => {
                tg.HapticFeedback.impactOccurred('medium');
            });
        });
    </script>
</body>
</html>
