<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caser Monk Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root {
            --green: #2ecc71;
            --bg: #000000;
            --card: #121212;
            --text: #ffffff;
            --sub-text: #8e8e93;
            --accent: #007aff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 0; }

        .app-container { padding: 20px; max-width: 500px; margin: 0 auto; }

        /* Профиль */
        .profile-card {
            background: linear-gradient(180deg, rgba(46, 204, 113, 0.1) 0%, rgba(18, 18, 18, 0) 100%);
            border: 1px solid rgba(255,255,255,0.05); border-radius: 30px;
            padding: 40px 20px; text-align: center; margin-bottom: 25px;
        }
        .avatar {
            width: 110px; height: 110px; border-radius: 50%;
            border: 3px solid var(--green); margin-bottom: 15px;
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.2);
        }
        .username { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }

        /* Кнопка Пополнить */
        .btn-deposit {
            background: var(--green); color: #000; border: none; border-radius: 20px;
            width: 100%; padding: 18px; font-size: 17px; font-weight: 700;
            cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-deposit:active { transform: scale(0.96); }

        /* Модальное окно */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1000;
        }
        .modal-sheet {
            position: absolute; bottom: 0; width: 100%; background: #1c1c1e;
            border-radius: 35px 35px 0 0; padding: 30px 20px;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* Выбор оплаты */
        .pay-option {
            background: rgba(255,255,255,0.04); border-radius: 20px; padding: 20px;
            display: flex; align-items: center; gap: 15px; margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05); cursor: pointer;
        }
        .pay-option img { width: 40px; height: 40px; }
        .pay-title { font-weight: 700; font-size: 16px; }

        /* Поле ввода суммы */
        #amount-container { display: none; margin-top: 20px; text-align: center; }
        .input-group { position: relative; margin-bottom: 20px; }
        .ton-input {
            width: 100%; background: #2c2c2e; border: 2px solid transparent;
            border-radius: 18px; padding: 20px; color: white; font-size: 24px;
            text-align: center; font-weight: 700; transition: 0.3s;
        }
        .ton-input:focus { border-color: var(--green); outline: none; background: #3a3a3c; }
        .ton-symbol { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-weight: 700; color: var(--sub-text); }

        /* Инвентарь */
        .inventory-section { background: var(--card); border-radius: 25px; padding: 25px; margin-top: 25px; }
        .inventory-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
        .slot { aspect-ratio: 1/1; background: rgba(255,255,255,0.03); border: 1px dashed #333; border-radius: 18px; }

        .ton-connect-hidden { display: none; } /* Кнопка будет невидимой, но рабочей */
    </style>
</head>
<body>

    <div class="app-container">
        <div class="profile-card">
            <img src="" id="user-avatar" class="avatar" alt="👤">
            <div class="username" id="user-name">Загрузка...</div>
            <div id="ton-connect-btn" class="ton-connect-hidden"></div>
        </div>

        <button class="btn-deposit" onclick="toggleModal(true)">
            <span>💵</span> Пополнить баланс
        </button>

        <div class="inventory-section">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight:700; font-size:18px;">Инвентарь</span>
                <span style="color:var(--sub-text); font-size:13px;">0 предметов</span>
            </div>
            <div class="inventory-grid">
                <div class="slot"></div><div class="slot"></div><div class="slot"></div>
                <div class="slot"></div><div class="slot"></div><div class="slot"></div>
            </div>
        </div>
    </div>

    <div id="pay-modal" class="modal-overlay" onclick="toggleModal(false)">
        <div class="modal-sheet" onclick="event.stopPropagation()">
            <div style="width:40px; height:5px; background:#3a3a3c; border-radius:10px; margin: 0 auto 20px;"></div>
            
            <div id="method-selector">
                <h2 style="margin:0 0 20px 5px;">Способ пополнения</h2>
                <div class="pay-option" onclick="handleTonClick()">
                    <img src="https://cryptologos.cc/logos/toncoin-ton-logo.png">
                    <div>
                        <div class="pay-title">TON Wallet</div>
                        <div style="font-size:12px; color:var(--sub-text)">Минимум 0.1 TON</div>
                    </div>
                </div>
                <div class="pay-option" onclick="alert('Stars в разработке')">
                    <img src="https://img.icons8.com/color/96/star--v1.png">
                    <div class="pay-title">Telegram Stars</div>
                </div>
            </div>

            <div id="amount-container">
                <h2 style="margin-bottom:10px;">Введите сумму</h2>
                <p style="color:var(--sub-text); margin-bottom:25px; font-size:14px;">Деньги поступят на ваш баланс сразу после оплаты</p>
                
                <div class="input-group">
                    <input type="number" id="ton-amount" class="ton-input" placeholder="0.00" step="0.1" min="0.1" max="9999">
                    <span class="ton-symbol">TON</span>
                </div>

                <button class="btn-deposit" onclick="executeTonPay()">Подтвердить и оплатить</button>
                <button style="background:none; border:none; color:var(--sub-text); margin-top:15px;" onclick="backToMethods()">⬅ Назад</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. Настройка TonConnect (обязательно RAW ссылка на твой GitHub)
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/casemonkbot-sudo/casemonk-bot/main/public/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        // 2. Данные пользователя
        const user = tg.initDataUnsafe.user;
        if(user) {
            document.getElementById('user-name').innerText = user.username ? `@${user.username}` : user.first_name;
            document.getElementById('user-avatar').src = user.photo_url || `https://ui-avatars.com/api/?name=${user.first_name}&background=2ecc71&color=000`;
        }

        function toggleModal(show) {
            document.getElementById('pay-modal').style.display = show ? 'block' : 'none';
            if(!show) backToMethods();
            tg.HapticFeedback.impactOccurred('light');
        }

        // 3. Логика кнопки TON
        async function handleTonClick() {
            if (!tonConnectUI.connected) {
                // Если не подключен — вызываем окно подключения
                await tonConnectUI.openModal();
            } else {
                // Если уже подключен — переключаем на ввод суммы
                document.getElementById('method-selector').style.display = 'none';
                document.getElementById('amount-container').style.display = 'block';
            }
        }

        function backToMethods() {
            document.getElementById('method-selector').style.display = 'block';
            document.getElementById('amount-container').style.display = 'none';
        }

        // 4. САМА ОПЛАТА
        async function executeTonPay() {
            const amountInput = document.getElementById('ton-amount').value;
            const amount = parseFloat(amountInput);

            if (isNaN(amount) || amount < 0.1 || amount > 9999) {
                tg.showAlert("Пожалуйста, введите корректную сумму от 0.1 до 9999 TON");
                return;
            }

            // Переводим в нанотоны (1 TON = 10^9 нанотонов)
            const nanoAmount = (amount * 1000000000).toString();

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 360,
                messages: [{
                    address: "UQCZVO12gl7nNHEPgup58ZdlUJQIg7ANsuNIo73CYMaRyZzZ", // Твой кошелек
                    amount: nanoAmount
                }]
            };

            try {
                tg.HapticFeedback.notificationOccurred('success');
                await tonConnectUI.sendTransaction(transaction);
                tg.showAlert("Транзакция отправлена в кошелек!");
                toggleModal(false);
            } catch (e) {
                console.error(e);
                tg.showAlert("Оплата отменена или произошла ошибка");
            }
        }
    </script>
</body>
</html>
