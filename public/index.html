<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CaseMonk</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000; --glass: rgba(255, 255, 255, 0.08); --border: 1px solid rgba(255, 255, 255, 0.1); --accent: #007AFF; --red: #ff3b30; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }

        /* Header & Balance */
        .header { display: flex; justify-content: flex-end; padding: 15px 20px; position: fixed; top: 0; width: 100%; z-index: 100; }
        .bal-box { display: flex; align-items: center; background: var(--glass); padding: 6px 14px; border-radius: 20px; border: var(--border); font-weight: 800; }
        .bal-box img { width: 18px; margin-right: 8px; }
        .add-btn { color: #34c759; font-size: 20px; cursor: pointer; margin-left: 10px; }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 92%; background: rgba(255,255,255,0.05); backdrop-filter: blur(25px); border-radius: 25px; border: var(--border); display: flex; padding: 12px; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: #8e8e93; font-size: 10px; font-weight: 600; cursor: pointer; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }

        /* Layout */
        .page { display: none; padding: 75px 20px 120px; height: 100vh; overflow-y: auto; }
        .page.active { display: block; }

        /* UI Elements */
        .btn { background: var(--glass); border: var(--border); color: #fff; padding: 16px; border-radius: 18px; width: 100%; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; border: none; }
        .btn-main { background: var(--accent); }
        .promo-input { width: 100%; background: rgba(255,255,255,0.05); border: var(--border); padding: 14px; border-radius: 14px; color: #fff; text-align: center; font-weight: 700; margin: 10px 0; outline: none; }
        
        /* Roulette */
        .roulette { width: 100%; height: 140px; background: #0a0a0a; border-radius: 20px; border: var(--border); position: relative; overflow: hidden; margin: 15px 0; }
        .pointer { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--accent); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 15px var(--accent); }
        .tape { display: flex; align-items: center; transition: transform 9s cubic-bezier(0.1, 0, 0.1, 1); }
        .tape-item { min-width: 115px; display: flex; justify-content: center; }
        .tape-item img { width: 85px; height: 85px; object-fit: contain; }

        /* Modal & Overlay */
        .modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; padding: 25px; flex-direction: column; }
        .modal.active { display: flex; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; }
        
        /* Inventory */
        .inv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .slot { aspect-ratio: 1; background: var(--glass); border: var(--border); border-radius: 15px; display: flex; align-items: center; justify-content: center; }
        .slot img { width: 75%; }
        
        #toast { position: fixed; top: 75px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 12px; font-weight: 700; z-index: 4000; display: none; text-align: center; width: 80%; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div class="header">
        <div class="bal-box">
            <img src="tonbalance001.png">
            <span id="bal-val">0.00</span>
            <i class="fa-solid fa-circle-plus add-btn" onclick="openM('m-dep')"></i>
        </div>
    </div>

    <div id="p-cases" class="page active">
        <div style="background: var(--glass); padding: 20px; border-radius: 25px; border: var(--border);" onclick="prepareCase()">
            <img src="case_drop.png" style="width: 100%; border-radius: 15px; margin-bottom: 15px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <b style="font-size: 20px;">DROP</b>
                <span style="background: var(--accent); padding: 6px 16px; border-radius: 12px; font-weight: 800;">10.00 TON</span>
            </div>
        </div>
    </div>

    <div id="p-prof" class="page">
        <div style="text-align: center; margin-bottom: 25px;">
            <img id="u-ava" src="" style="width:90px; height:90px; border-radius:50%; border:2px solid var(--accent); margin-bottom:10px;">
            <div id="u-nick" style="font-size: 22px; font-weight: 800;">User</div>
            <div id="u-handle" style="color: #8e8e93; font-size: 14px; margin-bottom: 15px;">@username</div>
            <button class="btn" onclick="window.open('https://t.me/casemonk_sup_bot')">
                <i class="fa-solid fa-headset"></i> <span class="l-support">Поддержка</span>
            </button>
        </div>

        <div style="background: var(--glass); padding: 20px; border-radius: 20px; border: var(--border);">
            <b class="l-promo-h">Введите промокод</b>
            <input type="text" id="promo-in" class="promo-input" placeholder="XXXX-XXXX">
            <button class="btn btn-main l-promo-btn" onclick="checkPromo()">Активировать</button>
        </div>

        <div style="display:flex; gap:10px; margin: 20px 0;">
            <button class="btn" onclick="changeL('ru')">Русский</button>
            <button class="btn" onclick="changeL('en')">English</button>
        </div>

        <b class="l-inv" style="font-size: 18px;">Инвентарь</b>
        <div id="inv-list" class="inv-grid"></div>
        <div id="inv-empty" style="text-align:center; color:#555; margin-top:20px;" class="l-empty">Пусто</div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="tab('cases', this)"><i class="fa-solid fa-box-open"></i><span class="l-nav1">КЕЙСЫ</span></div>
        <div class="nav-item" onclick="tab('prof', this)"><i class="fa-solid fa-user"></i><span class="l-nav2">ПРОФИЛЬ</span></div>
    </nav>

    <div id="m-case" class="modal">
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;" onclick="closeM('m-case')">
            <i class="fa-solid fa-chevron-left"></i> <b style="font-size:22px;">DROP</b>
        </div>
        <div class="roulette"><div class="pointer"></div><div id="tape" class="tape"></div></div>
        <button class="btn btn-main" style="height:60px;" onclick="run(false)" id="btn-open">Открыть за 10 TON</button>
        <button class="btn" onclick="run(true)" id="btn-demo">Демо режим</button>
    </div>

    <div id="m-dep" class="modal">
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;" onclick="closeM('m-dep')">
            <i class="fa-solid fa-chevron-left"></i> <b class="l-dep-h">Пополнение</b>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <button class="btn" id="t-ton" onclick="depTab('ton')" style="background:var(--accent)">TON</button>
            <button class="btn" id="t-gift" onclick="depTab('gift')">GIFTS</button>
        </div>
        <div id="d-ton">
            <button class="btn" id="wall-btn" onclick="linkWall()">Привязать кошелек</button>
            <div id="wall-box" style="display:none; margin-top:15px;">
                <p style="font-size:12px; color:#8e8e93;">Адрес для перевода:</p>
                <code style="display:block; background:#111; padding:12px; border-radius:12px; font-size:11px; word-break:break-all; margin:10px 0;">UQCZVO12gl7nNHEPgup58ZdlUJQIg7ANsuNIo73CYMaRyZzZ</code>
                <input type="number" id="dep-v" class="promo-input" placeholder="0.10 - 9999 TON">
                <button class="btn btn-main l-dep-btn" onclick="sendDep()">Внести TON</button>
            </div>
        </div>
        <div id="d-gift" style="display:none; text-align:center;">
            <p class="l-gift-txt">Отправьте NFT подарок на аккаунт:</p>
            <h3 style="color:var(--accent); margin:15px 0;">@casemonk_relayer</h3>
            <button class="btn btn-main" onclick="window.open('https://t.me/casemonk_relayer')">Перейти к боту</button>
        </div>
    </div>

    <div id="win-overlay" class="overlay">
        <h1 style="color:var(--accent); font-weight:900;" class="l-win-h">ВЫ ВЫИГРАЛИ!</h1>
        <img id="win-img" src="" style="width:180px; height:180px; object-fit:contain; margin:20px 0;">
        <h2 id="win-name">Item Name</h2>
        <h3 id="win-price" style="margin-bottom:25px;">0.00 TON</h3>
        <button class="btn btn-main l-keep" id="w-keep">Оставить</button>
        <button class="btn l-sell" id="w-sell">Продать</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let balance = 0.00;
        let inv = JSON.parse(localStorage.getItem('c_inv') || '[]');
        let isSpin = false;
        let isLinked = false;

        const ITEMS = [
            { n: "Nail Bracelet Random", p: 115.83, c: 0.1, img: "nailbracelet.png" },
            { n: "Bonded Ring Random", p: 40.10, c: 0.3, img: "bondedring.png" },
            { n: "Signet Ring Random", p: 32.69, c: 1.0, img: "signetring.png" },
            { n: "Diamond Ring Random", p: 26.59, c: 2.5, img: "diamondring.png" },
            { n: "Cupid Charm Random", p: 20.19, c: 3.5, img: "cupidcharm.png" },
            { n: "Crystal Ball Random", p: 11.87, c: 35.0, img: "crystalball.png" },
            { n: "Love Candle Random", p: 10.04, c: 40.0, img: "lovecandle.png" },
            { n: "Jolly Chimp Random", p: 6.46, c: 45.0, img: "jollychimp.png" },
            { n: "Light Sword Random", p: 5.40, c: 50.0, img: "lightsword.png" },
            { n: "Snoop Dogg Random", p: 4.95, c: 55.0, img: "snoopdogg.png" },
            { n: "3.0 TON balance", p: 3.00, c: 48.0, img: "tonbalance001.png", cash: true }
        ];

        const LANGS = {
            ru: { support: "Поддержка", promoh: "Введите промокод", promob: "Активировать", inv: "Инвентарь", empty: "Пусто", dep: "Пополнение", nav1: "КЕЙСЫ", nav2: "ПРОФИЛЬ", win: "ВЫ ВЫИГРАЛИ!", gift: "Отправьте NFT подарок на аккаунт:", keep: "Оставить", sell: "Продать", depbtn: "Внести TON" },
            en: { support: "Support", promoh: "Enter Promo Code", promob: "Activate", inv: "Inventory", empty: "Empty", dep: "Deposit", nav1: "CASES", nav2: "PROFILE", win: "YOU WON!", gift: "Send NFT gift to account:", keep: "Keep", sell: "Sell", depbtn: "Deposit TON" }
        };

        function tab(t, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('p-'+t).classList.add('active');
            el.classList.add('active');
        }

        function changeL(l) {
            const t = LANGS[l];
            document.querySelector('.l-support').innerText = t.support;
            document.querySelector('.l-promo-h').innerText = t.promoh;
            document.querySelector('.l-promo-btn').innerText = t.promob;
            document.querySelector('.l-inv').innerText = t.inv;
            document.querySelector('.l-empty').innerText = t.empty;
            document.querySelector('.l-dep-h').innerText = t.dep;
            document.querySelector('.l-nav1').innerText = t.nav1;
            document.querySelector('.l-nav2').innerText = t.nav2;
            document.querySelector('.l-win-h').innerText = t.win;
            document.querySelector('.l-gift-txt').innerText = t.gift;
            document.querySelector('.l-keep').innerText = t.keep;
            document.querySelector('.l-sell').innerText = t.sell;
            document.querySelector('.l-dep-btn').innerText = t.depbtn;
        }

        function prepareCase() {
            openM('m-case');
            const t = document.getElementById('tape');
            t.innerHTML = '';
            for(let i=0; i<85; i++) {
                const it = ITEMS[Math.floor(Math.random()*ITEMS.length)];
                t.innerHTML += `<div class="tape-item"><img src="${it.img}"></div>`;
            }
        }

        function run(demo) {
            if(isSpin) return;
            if(!demo && balance < 10) return msg("Недостаточно TON", "var(--red)");
            
            isSpin = true;
            if(!demo) updBal(-10);

            const t = document.getElementById('tape');
            const winIdx = 70;
            const r = Math.random() * 100;
            let winner = ITEMS[ITEMS.length-1];
            let sum = 0;
            for(let it of ITEMS) { sum += it.c; if(r <= sum) { winner = it; break; } }
            
            t.children[winIdx].innerHTML = `<img src="${winner.img}">`;
            const offset = (winIdx * 115) - (window.innerWidth / 2) + 57;
            t.style.transition = 'transform 9s cubic-bezier(0.1, 0, 0.1, 1)';
            t.style.transform = `translateX(-${offset}px)`;

            setTimeout(() => {
                showW(winner, demo);
                isSpin = false;
            }, 9500);
        }

        function showW(it, demo) {
            const ov = document.getElementById('win-overlay');
            document.getElementById('win-img').src = it.img;
            document.getElementById('win-name').innerText = it.n;
            document.getElementById('win-price').innerText = it.p + " TON";
            ov.style.display = 'flex';

            document.getElementById('w-keep').onclick = () => {
                if(!demo) { if(it.cash) updBal(it.p); else { inv.push(it); saveInv(); } }
                ov.style.display = 'none'; resetR();
            };
            document.getElementById('w-sell').onclick = () => {
                if(!demo) updBal(it.p);
                ov.style.display = 'none'; resetR();
            };
        }

        function invClick(i) {
            const it = inv[i];
            tg.showPopup({
                title: it.n,
                message: `Цена: ${it.p} TON`,
                buttons: [{id:'out', text:'Вывести'}, {id:'sell', text:'Продать', type:'destructive'}, {type:'cancel'}]
            }, (id) => {
                if(id === 'sell') { updBal(it.p); inv.splice(i,1); saveInv(); }
                else if(id === 'out') {
                    tg.showPopup({title:"Вывод", message:"Напишите @casemonk_relayer", buttons:[{id:'ok', text:'Я выполнил'}]}, (r) => {
                        if(r === 'ok') {
                            tg.showAlert("Успешно ваш вывод обработан, ожидайте получения подарка до 24х часов, в случае ошибки обратитесь в поддержку");
                            inv.splice(i,1); saveInv();
                        }
                    });
                }
            });
        }

        function linkWall() {
            isLinked = !isLinked;
            document.getElementById('wall-btn').innerText = isLinked ? "Отвязать кошелек" : "Привязать кошелек";
            document.getElementById('wall-box').style.display = isLinked ? "block" : "none";
        }

        function sendDep() {
            const v = document.getElementById('dep-v').value;
            if(v < 0.1) msg("Ошибка Пополнение от 0.10 тон", "var(--red)");
            else tg.showAlert("Запрос на пополнение отправлен");
        }

        function checkPromo() {
            const v = document.getElementById('promo-in').value;
            if(v === "CASE") msg("Успешно активирован!", "var(--accent)");
            else if(v === "OLD") msg("Промокод закончился", "var(--red)");
            else msg("Промокод не существует", "var(--red)");
        }

        function updBal(v) { balance += v; document.getElementById('bal-val').innerText = balance.toFixed(2); }
        function saveInv() { localStorage.setItem('c_inv', JSON.stringify(inv)); renderInv(); }
        function renderInv() {
            const l = document.getElementById('inv-list'); l.innerHTML = '';
            document.getElementById('inv-empty').style.display = inv.length ? 'none' : 'block';
            inv.forEach((it, i) => { l.innerHTML += `<div class="slot" onclick="invClick(${i})"><img src="${it.img}"></div>`; });
        }
        function msg(t, c) {
            const m = document.getElementById('toast'); m.innerText = t; m.style.background = c; m.style.display = 'block';
            setTimeout(() => m.style.display = 'none', 3000);
        }
        function openM(id) { document.getElementById(id).classList.add('active'); }
        function closeM(id) { document.getElementById(id).classList.remove('active'); resetR(); }
        function resetR() { const t = document.getElementById('tape'); t.style.transition = 'none'; t.style.transform = 'translateX(0)'; }
        function depTab(t) {
            document.getElementById('d-ton').style.display = t === 'ton' ? 'block' : 'none';
            document.getElementById('d-gift').style.display = t === 'gift' ? 'block' : 'none';
            document.getElementById('t-ton').style.background = t === 'ton' ? 'var(--accent)' : 'var(--glass)';
            document.getElementById('t-gift').style.background = t === 'gift' ? 'var(--accent)' : 'var(--glass)';
        }

        const u = tg.initDataUnsafe.user;
        if(u) {
            document.getElementById('u-nick').innerText = u.first_name;
            document.getElementById('u-handle').innerText = '@' + (u.username || 'user');
            if(u.photo_url) document.getElementById('u-ava').src = u.photo_url;
        }
        renderInv();
    </script>
</body>
</html>
