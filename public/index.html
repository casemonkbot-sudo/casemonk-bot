<style>
    /* Стили для кейсов */
    .case-banner { width: 100%; border-radius: 20px; margin-bottom: 15px; border: var(--border); }
    .case-info { text-align: left; width: 100%; margin-bottom: 20px; }
    .roulette-wrapper { 
        width: 100%; overflow: hidden; position: relative; background: #0d0d0d; 
        border-radius: 15px; height: 120px; border: var(--border); margin: 20px 0;
    }
    .roulette-line { 
        position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; 
        background: var(--accent-blue); z-index: 10; box-shadow: 0 0 10px var(--accent-blue);
    }
    .items-tape { display: flex; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); will-change: transform; }
    .tape-item { min-width: 100px; height: 120px; display: flex; align-items: center; justify-content: center; padding: 10px; }
    .tape-item img { width: 80px; height: 80px; object-fit: contain; }

    .drop-list { width: 100%; margin-top: 30px; }
    .drop-item { 
        background: var(--card); border-radius: 18px; padding: 15px; margin-bottom: 10px;
        display: flex; align-items: center; justify-content: space-between; border: var(--border);
    }
    .demo-msg { 
        position: fixed; top: 20%; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.9); padding: 15px; border-radius: 12px; z-index: 2000;
        text-align: center; border: 1px solid var(--accent-blue); display: none;
    }
</style>

<div id="page-cases" class="main-container">
    <div id="case-list">
        <div class="friends-card" onclick="openCaseMenu('DROP')">
            <img src="DROP.png" class="case-banner">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <b>Кейс DROP</b>
                <span style="background:var(--accent-blue); padding:5px 12px; border-radius:10px;">10 TON</span>
            </div>
        </div>
    </div>
</div>

<div id="m-case-open" class="modal">
    <div class="m-head"><i class="fa-solid fa-chevron-left back" onclick="closeM('m-case-open')"></i> Кейс DROP</div>
    <img src="DROP.png" class="case-banner" id="case-main-img">
    
    <div class="roulette-wrapper" id="roulette-box" style="display:none;">
        <div class="roulette-line"></div>
        <div class="items-tape" id="tape"></div>
    </div>

    <div id="case-actions">
        <button class="btn-full" onclick="startSpin(false)">Открыть за 10 TON</button>
        <button class="btn-full" style="background:#1c1c1e;" onclick="startSpin(true)">Демо режим</button>
    </div>

    <div class="drop-list">
        <p style="margin-bottom:15px; font-weight:600;">Наполнение кейса:</p>
        <div id="items-content"></div>
    </div>
</div>

<div id="demo-notice" class="demo-msg">Вы выиграли этот подарок в демо режиме, приз не начисляется, попробуйте выиграть за реальный баланс!</div>

<script>
const CASE_ITEMS = [
    { n: "Nail Bracelet Random", p: 115.83, img: "nail_bracelet.png", s: 0.1 },
    { n: "Bonded Ring Random", p: 40.10, img: "bonded_ring.png", s: 0.3 },
    { n: "Signet Ring Random", p: 32.69, img: "signet_ring.png", s: 1 },
    { n: "Diamond Ring Random", p: 26.59, img: "diamond_ring.png", s: 2.5 },
    { n: "Cupid Charm Random", p: 20.19, img: "cupid_charm.png", s: 3.5 },
    { n: "Crystal Ball Random", p: 11.87, img: "crystal_ball.png", s: 35 },
    { n: "Love Candle Random", p: 10.04, img: "love_candle.png", s: 40 },
    { n: "Jolly Chimp Random", p: 6.46, img: "jolly_chimp.png", s: 45 },
    { n: "Light Sword Random", p: 5.40, img: "light_sword.png", s: 50 },
    { n: "Shoop Dogg Random", p: 4.95, img: "shoop_dogg.png", s: 55 },
    { n: "3.0 TON balance", p: 3.0, img: "ton_coin.png", s: 48, isTon: true }
];

let isSpinning = false;
let userInventory = JSON.parse(localStorage.getItem('inv') || '[]');

function openCaseMenu(name) {
    const cont = document.getElementById('items-content');
    cont.innerHTML = '';
    CASE_ITEMS.forEach(item => {
        cont.innerHTML += `
            <div class="drop-item">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img src="${item.img}" width="40">
                    <div><div>${item.n}</div><div style="font-size:12px; color:var(--text-sec)">${item.p} TON</div></div>
                </div>
            </div>`;
    });
    openM('m-case-open');
}

function startSpin(isDemo) {
    if(isSpinning) return;
    const balance = parseFloat(document.getElementById('bal-val').innerText);
    if(!isDemo && balance < 10) return tg.showAlert("Недостаточно TON!");

    isSpinning = true;
    if(!isDemo) updateBalance(-10);

    const tape = document.getElementById('tape');
    const box = document.getElementById('roulette-box');
    document.getElementById('case-main-img').style.display = 'none';
    box.style.display = 'block';

    // Генерация ленты
    tape.innerHTML = '';
    for(let i=0; i<60; i++) {
        const randomItem = CASE_ITEMS[Math.floor(Math.random()*CASE_ITEMS.length)];
        tape.innerHTML += `<div class="tape-item"><img src="${randomItem.img}"></div>`;
    }

    // Логика шансов
    let winner;
    const r = Math.random() * 100;
    if(isDemo) {
        // 80% шанс на дорогое в демо
        winner = Math.random() < 0.8 ? CASE_ITEMS.find(i => i.p > 20) : CASE_ITEMS[9];
    } else {
        const sorted = [...CASE_ITEMS].sort((a,b) => a.s - b.s);
        winner = sorted.find(i => r <= i.s) || CASE_ITEMS[9];
    }

    tape.lastElementChild.innerHTML = `<img src="${winner.img}">`;
    tape.style.transition = 'none';
    tape.style.transform = 'translateX(0)';
    
    setTimeout(() => {
        tape.style.transition = 'transform 5s cubic-bezier(0.15, 0, 0.15, 1)';
        const shift = (58 * 100) + (Math.random() * 50); 
        tape.style.transform = `translateX(-${shift}px)`;
    }, 50);

    setTimeout(() => {
        isSpinning = false;
        if(isDemo) {
            const msg = document.getElementById('demo-notice');
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 5000);
        } else {
            handleWin(winner);
        }
        tg.HapticFeedback.notificationOccurred('success');
    }, 5500);
}

function handleWin(item) {
    if(item.isTon) {
        updateBalance(item.p);
        tg.showAlert(`Вы выиграли ${item.p} TON!`);
    } else {
        userInventory.push(item);
        localStorage.setItem('inv', JSON.stringify(userInventory));
        tg.showConfirm(`Вы выиграли ${item.n}! Продать за ${item.p} TON?`, (ok) => {
            if(ok) sellItem(userInventory.length - 1);
        });
    }
    renderInventory();
}

function updateBalance(val) {
    const cur = parseFloat(document.getElementById('bal-val').innerText);
    document.getElementById('bal-val').innerText = (cur + val).toFixed(2);
}

function renderInventory() {
    const grid = document.querySelector('.inv-grid');
    grid.innerHTML = '';
    userInventory.forEach((item, idx) => {
        grid.innerHTML += `<div class="slot" onclick="showInvAction(${idx})" style="border:none; background:#1c1c1e;"><img src="${item.img}" style="width:100%; padding:5px;"></div>`;
    });
}

function showInvAction(idx) {
    const item = userInventory[idx];
    tg.showPopup({
        title: item.n,
        message: `Цена: ${item.p} TON`,
        buttons: [
            {id: 'sell', type: 'destructive', text: 'Продать'},
            {id: 'out', type: 'default', text: 'Вывести'},
            {type: 'cancel'}
        ]
    }, (id) => {
        if(id === 'sell') sellItem(idx);
        if(id === 'out') {
            tg.showAlert("Для вывода напишите на аккаунт @casemonk_relayer иначе ваш подарок не дойдёт!");
            setTimeout(() => {
                tg.showConfirm("Вы подтверждаете вывод подарка?", (ok) => {
                    if(ok) {
                        tg.showAlert("Успешно! Ваш подарок поставлен на вывод, ожидайте до 24 часов.");
                        // Здесь отправка заявки в бота
                        tg.sendData(JSON.stringify({type: "withdraw_item", item: item.n, user: u.username}));
                        userInventory.splice(idx, 1);
                        renderInventory();
                    }
                });
            }, 1000);
        }
    });
}

function sellItem(idx) {
    updateBalance(userInventory[idx].p);
    userInventory.splice(idx, 1);
    localStorage.setItem('inv', JSON.stringify(userInventory));
    renderInventory();
}

// Инициализация при загрузке
renderInventory();
</script>
