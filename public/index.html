<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caser Profile</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --accent: #007aff; --bg: #0b0b0b; --card: #1c1c1e; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        .app { padding: 20px; padding-bottom: 100px; }
        
        .profile-header {
            background: linear-gradient(180deg, rgba(0, 122, 255, 0.1) 0%, rgba(0, 0, 0, 0) 100%);
            border-radius: 28px; padding: 30px 20px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 20px;
        }
        .avatar { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--accent); margin-bottom: 10px; }
        
        #ton-connect-btn { display: flex; justify-content: center; margin: 15px 0; }

        .pay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .pay-card {
            background: var(--card); border-radius: 20px; padding: 15px; text-align: center;
            border: 1px solid rgba(255,255,255,0.05); transition: 0.2s;
        }
        .pay-card:active { transform: scale(0.95); }
        .pay-icon { width: 30px; height: 30px; margin-bottom: 8px; }

        .inventory { background: var(--card); border-radius: 24px; padding: 20px; }
        .slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .slot { aspect-ratio: 1/1; background: rgba(255,255,255,0.02); border: 1px dashed #3a3a3c; border-radius: 15px; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(20,20,20,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; }
        .nav-item { font-size: 10px; color: #8e8e93; text-align: center; text-decoration: none; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>
    <div class="app">
        <div class="profile-header">
            <img src="" id="user-avatar" class="avatar">
            <div id="user-name" style="font-size: 20px; font-weight: 700;">@username</div>
            <div id="ton-connect-btn"></div>
        </div>

        <div class="pay-grid">
            <div class="pay-card" onclick="payStars()">
                <img src="https://img.icons8.com/color/96/star--v1.png" class="pay-icon">
                <div style="font-weight:600;">STARS</div>
            </div>
            <div class="pay-card" onclick="payTon()">
                <img src="https://cryptologos.cc/logos/toncoin-ton-logo.png" class="pay-icon">
                <div style="font-weight:600;">0.1 TON</div>
            </div>
        </div>

        <div class="inventory">
            <div style="font-weight:700;">Инвентарь</div>
            <div class="slots">
                <div class="slot"></div><div class="slot"></div><div class="slot"></div>
                <div class="slot"></div><div class="slot"></div><div class="slot"></div>
            </div>
        </div>
        
        <center><a href="https://t.me/casemonk_sup_robot" style="color:var(--accent); text-decoration:none; font-size:12px; display:block; margin-top:20px;">🎧 Поддержка</a></center>
    </div>

    <nav class="nav">
        <a href="#" class="nav-item"><div>💸</div>Заработок</a>
        <a href="#" class="nav-item"><div>🚀</div>Играть</a>
        <a href="#" class="nav-item active"><div>👤</div>Профиль</a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://casemonkbot-sudo.github.io/casemonk-bot/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        const user = tg.initDataUnsafe.user;
        if(user) {
            document.getElementById('user-name').innerText = user.username ? `@${user.username}` : user.first_name;
            document.getElementById('user-avatar').src = user.photo_url || 'https://ui-avatars.com/api/?name=U';
        }

        async function payTon() {
            if (!tonConnectUI.connected) {
                tg.showAlert("Сначала подключи кошелек!");
                return;
            }
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 300,
                messages: [{
                    address: "UQCZVO12gl7nNHEPgup58ZdlUJQIg7ANsuNIo73CYMaRyZzZ",
                    amount: "100000000" // 0.1 TON
                }]
            };
            try {
                await tonConnectUI.sendTransaction(transaction);
                tg.showAlert("Платеж отправлен!");
            } catch (e) { tg.showAlert("Ошибка оплаты"); }
        }

        function payStars() {
            tg.showPopup({
                title: "Оплата Stars",
                message: "Бот выставит вам счет в личные сообщения.",
                buttons: [{type: "ok"}]
            });
            tg.sendData(JSON.stringify({action: "buy_stars"}));
        }
    </script>
</body>
</html>
