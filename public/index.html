<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CaseMonk Web App</title>
    <style>
        :root {
            --bg-color: #000000;
            --accent-blue: #007aff;
            --text-color: #ffffff;
            --card-bg: #1a1a1a;
            --tg-green: #76ff03;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- АНИМАЦИИ ПОДАРКОВ (TG STYLE) --- */
        @keyframes tg-jump {
            0% { transform: translateY(0); }
            30% { transform: translateY(-10px) rotate(-5deg); }
            50% { transform: translateY(0) rotate(3deg); }
            100% { transform: translateY(0); }
        }
        .anim-gift { animation: tg-jump 0.5s ease-in-out; }

        /* Шапка и Баланс */
        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .balance-card {
            background: var(--card-bg);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .ton-icon { width: 18px; height: 18px; }

        /* Кейс DROP (СТАРЫЙ ИНТЕРФЕЙС) */
        .case-header {
            text-align: center;
            margin: 20px 0;
        }

        .drop-title {
            font-size: 24px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .small-ton { width: 14px; height: 14px; vertical-align: middle; }

        /* Сетка предметов В КЕЙСЕ */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 15px;
        }

        .item-block {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            border: 1px solid #222;
        }

        /* ИНВЕНТАРЬ (Кнопки как на скриншоте) */
        .inventory-card {
            background: #1c1c24;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            border: 1px solid #2d2d3d;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-top: 10px;
        }

        .btn-sell {
            background: #32324a;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 14px 14px 5px 5px;
            font-size: 13px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }

        .btn-withdraw {
            background: var(--tg-green);
            color: black;
            border: none;
            padding: 10px;
            border-radius: 5px 5px 14px 14px;
            font-size: 13px;
            font-weight: bold;
        }

        /* Секция пополнения Gifts (Старый текст) */
        .gifts-section {
            padding: 15px;
            background: #0d0d0d;
            margin: 15px;
            border-radius: 12px;
            border: 1px solid #222;
        }

        .btn-main {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
        }

        /* Навигация */
        .nav-menu {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            background: #111;
            padding: 15px 0;
            justify-content: space-around;
            border-top: 1px solid #333;
        }

        .nav-item { font-size: 11px; color: #888; text-align: center; }
        .nav-item.active { color: var(--accent-blue); }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-card">
            <span id="user-balance">10.00</span> 
            <img src="https://cryptologos.cc/logos/toncoin-ton-logo.svg" class="ton-icon">
        </div>
        <div style="display:flex; gap:10px;">
            <button onclick="alert('RU')" style="background:none; border:1px solid #444; color:white; border-radius:8px; padding:5px 10px; font-size:12px;">Русский</button>
        </div>
    </div>

    <div class="case-header">
        <div class="drop-title">
            DROP <img src="https://cryptologos.cc/logos/toncoin-ton-logo.svg" class="small-ton">
        </div>
    </div>

    <div class="grid-container" id="case-items">
        </div>

    <div style="padding: 15px;">
        <button class="btn-main" style="height:50px;">ОТКРЫТЬ КЕЙС (1.5 TON)</button>
    </div>

    <div class="gifts-section">
        <div style="font-size: 13px; color: #888;">Отправьте Gift-код боту. После проверки баланс будет зачислен мгновенно.</div>
        <button class="btn-main" style="background:#222;">Активировать Gift</button>
    </div>

    <div style="padding: 0 15px; margin-bottom: 80px; display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <button class="btn-main" style="background:#1a1a1a; border:1px solid #333; margin:0;">🎁 Бонусы</button>
        <button class="btn-main" style="background:#1a1a1a; border:1px solid #333; margin:0;">👨‍💻 Поддержка</button>
    </div>

    <nav class="nav-menu">
        <div class="nav-item active">Кейсы</div>
        <div class="nav-item">Инвентарь</div>
        <div class="nav-item">Профиль</div>
    </nav>

    <script>
        const items = [
            { name: "Common", price: 0.1, color: "#888" },
            { name: "Uncommon", price: 0.5, color: "#007aff" },
            { name: "Rare", price: 2.0, color: "#a335ee" },
            { name: "Epic", price: 5.0, color: "#ff00ff" },
            { name: "Legendary", price: 10.0, color: "#ff8000" },
            { name: "Mythic", price: 15.0, color: "#ff4d4d" }
        ];

        function initGrid() {
            const container = document.getElementById('case-items');
            container.innerHTML = '';
            items.forEach(item => {
                container.innerHTML += `
                    <div class="item-block" onclick="animateItem(this)">
                        <div style="width:100%; height:45px; background:${item.color}; border-radius:8px; margin-bottom:8px;" class="item-img-target"></div>
                        <div style="font-size:10px; margin-bottom:4px;">${item.name}</div>
                        <div style="font-size:11px; font-weight:bold; color: #ccc;">
                            ${item.price} <img src="https://cryptologos.cc/logos/toncoin-ton-logo.svg" class="small-ton">
                        </div>
                    </div>
                `;
            });
        }

        function animateItem(el) {
            const target = el.querySelector('.item-img-target');
            target.classList.remove('anim-gift');
            void target.offsetWidth;
            target.classList.add('anim-gift');
            
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            }
        }

        window.onload = initGrid;
    </script>
</body>
</html>
