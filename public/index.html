<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CaseMonk</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f121d;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent: #246bfd;
            --green: #4ade80;
            --text: #ffffff;
            --text-gray: #94a3b8;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
        }

        /* Шапка */
        .header { display: flex; justify-content: space-between; padding: 15px 20px; align-items: center; }
        .balance { background: var(--card-bg); padding: 8px 15px; border-radius: 20px; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.1); }

        .page { display: none; padding: 0 15px 120px; }
        .page.active { display: block; }

        /* Плитка кейса */
        .case-card {
            background: var(--card-bg); border-radius: 20px; padding: 20px; text-align: center;
            border: 1px solid rgba(255,255,255,0.05); cursor: pointer; margin-top: 20px;
        }
        .case-card img { width: 140px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }

        /* Модальное окно */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1000;
            align-items: flex-end; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #161b2c; width: 100%; max-width: 500px; border-radius: 30px 30px 0 0;
            padding: 25px; position: relative; animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .modal-main-img { width: 120px; display: block; margin: 0 auto 10px; }
        
        /* Список предметов в столбик (как на скрине) */
        .items-list { margin: 20px 0; display: flex; flex-direction: column; gap: 10px; }
        .item-row {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.03); padding: 12px 15px; border-radius: 15px;
        }
        .item-info { display: flex; align-items: center; gap: 15px; }
        .item-info img { width: 40px; height: 40px; object-fit: contain; }
        .item-name { font-size: 15px; font-weight: 500; }
        .item-price { color: var(--green); font-weight: bold; font-size: 14px; }

        /* Выбор количества */
        .multi-select {
            display: flex; justify-content: center; gap: 10px; margin: 20px 0;
        }
        .multi-btn {
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 8px 15px; border-radius: 12px; cursor: pointer;
        }
        .multi-btn.active { background: var(--accent); border-color: var(--accent); }

        .btn-main {
            background: var(--accent); color: white; border: none; width: 100%;
            padding: 18px; border-radius: 18px; font-weight: bold; font-size: 16px;
        }

        /* Рулетка */
        #roulette-screen {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--bg); z-index: 2000; flex-direction: column; align-items: center; justify-content: center;
        }
        .roulette-box { width: 100%; height: 140px; position: relative; overflow: hidden; margin: 40px 0; background: rgba(255,255,255,0.02); }
        .rail { display: flex; position: absolute; left: 50%; transition: transform 8s cubic-bezier(0.1, 0, 0.1, 1); }
        .rail-item { min-width: 110px; height: 110px; display: flex; align-items: center; justify-content: center; }
        .rail-item img { width: 70px; }
        .pointer { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--green); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 15px var(--green); }

        /* Навигация */
        .nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(25, 30, 48, 0.95); display: flex; justify-content: space-around;
            padding: 15px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-link { color: var(--text-gray); text-decoration: none; font-size: 12px; text-align: center; }
        .nav-link.active { color: white; }
        .nav-link i { display: block; font-size: 20px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="header">
    <div id="u-name">Player</div>
    <div class="balance">
        <img src="https://cryptologos.cc/logos/toncoin-ton-logo.png" width="18">
        <span id="u-bal">0.1</span>
    </div>
</div>

<div id="p-cases" class="page active">
    <div class="case-card" onclick="showModal()">
        <img src="case_farm.jpg">
        <h3>Farm</h3>
        <div style="color: var(--green); font-weight: bold;">1.5 TON</div>
    </div>
</div>

<div id="modal" class="modal-overlay" onclick="if(event.target==this) hideModal()">
    <div class="modal">
        <img src="case_farm.jpg" class="modal-main-img">
        <h2 style="text-align: center; margin: 0;">Farm</h2>
        
        <div class="items-list">
            <div class="item-row">
                <div class="item-info"><img src="ring.png"><span class="item-name">Ring</span></div>
                <div class="item-price">0.7 T</div>
            </div>
            <div class="item-row">
                <div class="item-info"><img src="trophy.png"><span class="item-name">Trophy</span></div>
                <div class="item-price">0.5 T</div>
            </div>
            <div class="item-row">
                <div class="item-info"><img src="ton.webp"><span class="item-name">1 TON</span></div>
                <div class="item-price">1.0 T</div>
            </div>
        </div>

        <div style="text-align: center; font-size: 13px; color: var(--text-gray);">Количество открытий:</div>
        <div class="multi-select">
            <button class="multi-btn active" onclick="setCount(1, this)">1</button>
            <button class="multi-btn" onclick="setCount(2, this)">2</button>
            <button class="multi-btn" onclick="setCount(3, this)">3</button>
            <button class="multi-btn" onclick="setCount(4, this)">4</button>
            <button class="multi-btn" onclick="setCount(5, this)">5</button>
        </div>

        <button class="btn-main" onclick="startSpin()">Открыть кейс</button>
    </div>
</div>

<div id="roulette-screen">
    <h2 id="spin-status">Удачи!</h2>
    <div class="roulette-box">
        <div class="pointer"></div>
        <div id="rail" class="rail"></div>
    </div>
</div>

<div class="nav">
    <a href="#" class="nav-link active"><i class="fa-solid fa-box"></i>Кейсы</a>
    <a href="#" class="nav-link"><i class="fa-solid fa-user"></i>Профиль</a>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    let balance = 0.1;
    let openCount = 1;
    const pricePerCase = 1.5;

    const possibleItems = [
        { name: 'Ring', img: 'ring.png', price: 0.7 },
        { name: 'Trophy', img: 'trophy.png', price: 0.5 },
        { name: '1 TON', img: 'ton.webp', price: 1.0 }
    ];

    function showModal() { document.getElementById('modal').classList.add('active'); }
    function hideModal() { document.getElementById('modal').classList.remove('active'); }

    function setCount(num, btn) {
        openCount = num;
        document.querySelectorAll('.multi-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function startSpin() {
        const totalCost = pricePerCase * openCount;
        if (balance < totalCost) {
            alert("Недостаточно TON!");
            return;
        }

        hideModal();
        const screen = document.getElementById('roulette-screen');
        const rail = document.getElementById('rail');
        screen.style.display = 'flex';
        
        rail.style.transition = 'none';
        rail.style.transform = 'translateX(0)';
        rail.innerHTML = '';

        // Генерируем ленту предметов
        const spinItems = [];
        for(let i=0; i<80; i++) {
            spinItems.push(possibleItems[Math.floor(Math.random() * possibleItems.length)]);
        }

        spinItems.forEach(item => {
            rail.innerHTML += `<div class="rail-item"><img src="${item.img}"></div>`;
        });

        const winIndex = 70; // На каком предмете остановимся
        const winItem = spinItems[winIndex];

        setTimeout(() => {
            rail.style.transition = 'transform 8s cubic-bezier(0.1, 0, 0.1, 1)';
            // Центрируем выигрышный предмет
            const shift = (winIndex * 110) + 55;
            rail.style.transform = `translateX(-${shift}px)`;
        }, 100);

        setTimeout(() => {
            alert(`Поздравляем! Вы выбили: ${winItem.name}`);
            balance -= totalCost;
            document.getElementById('u-bal').innerText = balance.toFixed(1);
            screen.style.display = 'none';
        }, 8500);
    }

    // Имя из Телеграм
    const user = tg.initDataUnsafe?.user;
    if(user) document.getElementById('u-name').innerText = user.first_name;
</script>

</body>
</html>
