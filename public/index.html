<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CASE MONK RELEYER</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #007bff;
            --dark-bg: #000000;
            --card-bg: #0a0a0a;
            --border-color: #1a1a1a;
            --text-gray: #888;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Чтобы не скроллился весь экран, а только контент */
            height: 100vh;
        }

        /* Анимация появления */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .screen {
            display: none;
            padding: 20px;
            height: calc(100vh - 70px);
            overflow-y: auto;
            animation: fadeIn 0.3s ease;
        }

        .screen.active {
            display: block;
        }

        /* Шапка */
        .header {
            text-align: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-text {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 3px;
            color: var(--primary-blue);
            text-shadow: 0 0 10px rgba(0, 123, 255, 0.4);
        }

        /* Карточка профиля */
        .profile-card {
            background: var(--card-bg);
            border: 1px solid var(--primary-blue);
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            margin-top: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .user-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid var(--primary-blue);
            margin-bottom: 15px;
            object-fit: cover;
        }

        .user-name {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .user-id {
            font-size: 12px;
            color: var(--text-gray);
            margin-bottom: 20px;
        }

        .balance-label {
            font-size: 13px;
            color: var(--text-gray);
            text-transform: uppercase;
        }

        .balance-val {
            font-size: 34px;
            font-weight: 800;
            color: var(--primary-blue);
        }

        /* Кнопки пополнения */
        .pay-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        .pay-button {
            background: #111;
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 20px 10px;
            text-align: center;
            transition: 0.3s;
        }

        .pay-button:active {
            border-color: var(--primary-blue);
            background: #161616;
        }

        .pay-button i {
            font-size: 28px;
            margin-bottom: 10px;
            display: block;
        }

        .ton-icon { color: #0098ea; }
        .gift-icon { color: #ff9d00; }

        .pay-button span {
            font-size: 14px;
            font-weight: 600;
        }

        /* Навигация */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: #050505;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 10px; /* Отступ для iPhone */
        }

        .nav-item {
            color: #444;
            text-align: center;
            flex: 1;
            transition: 0.3s;
        }

        .nav-item i {
            font-size: 22px;
            display: block;
            margin-bottom: 4px;
        }

        .nav-item span {
            font-size: 10px;
            text-transform: uppercase;
        }

        .nav-item.active {
            color: var(--primary-blue);
        }

        /* Заглушки для других разделов */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            color: var(--text-gray);
        }

        .empty-state i {
            font-size: 50px;
            margin-bottom: 20px;
            opacity: 0.2;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-text">CASE MONK RELEYER</div>
    </div>

    <div id="cases" class="screen">
        <div class="empty-state">
            <i class="fas fa-box-open"></i>
            <p>Кейсы будут доступны скоро...</p>
        </div>
    </div>

    <div id="rocket" class="screen">
        <div class="empty-state">
            <i class="fas fa-rocket"></i>
            <p>Улучшения ракетки в разработке</p>
        </div>
    </div>

    <div id="profile" class="screen active">
        <div class="profile-card">
            <img id="avatar" src="" class="user-avatar" alt="User">
            <div id="username" class="user-name">Загрузка...</div>
            <div id="user-id" class="user-id">ID: 000000000</div>
            
            <div class="balance-label">Доступный баланс</div>
            <div class="balance-val" id="balance">0.00 $</div>
        </div>

        <div class="pay-grid">
            <div class="pay-button" onclick="handleAction('ton')">
                <i class="fa-solid fa-gem ton-icon"></i>
                <span>TON Pay</span>
            </div>
            <div class="pay-button" onclick="handleAction('gifts')">
                <i class="fa-solid fa-gift gift-icon"></i>
                <span>Gifts</span>
            </div>
        </div>
    </div>

    <div id="settings" class="screen">
        <div class="empty-state">
            <i class="fas fa-cog"></i>
            <p>Настройки профиля</p>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item" onclick="showScreen('cases', this)">
            <i class="fas fa-box"></i>
            <span>Кейсы</span>
        </div>
        <div class="nav-item" onclick="showScreen('rocket', this)">
            <i class="fas fa-rocket"></i>
            <span>Ракетка</span>
        </div>
        <div class="nav-item active" onclick="showScreen('profile', this)">
            <i class="fas fa-user"></i>
            <span>Профиль</span>
        </div>
        <div class="nav-item" onclick="showScreen('settings', this)">
            <i class="fas fa-cog"></i>
            <span>Меню</span>
        </div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        // Инициализация данных пользователя
        const user = tg.initDataUnsafe.user;
        if (user) {
            document.getElementById('username').innerText = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            document.getElementById('user-id').innerText = 'ID: ' + user.id;
            
            if (user.photo_url) {
                document.getElementById('avatar').src = user.photo_url;
            } else {
                document.getElementById('avatar').src = 'https://ui-avatars.com/api/?name=' + user.first_name + '&background=007bff&color=fff';
            }
        }

        // Логика переключения экранов
        function showScreen(screenId, element) {
            // Скрываем все экраны
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            // Деактивируем все кнопки навигации
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            // Активируем нужный
            document.getElementById(screenId).classList.add('active');
            element.classList.add('active');
            
            // Легкая вибрация при нажатии
            tg.HapticFeedback.impactOccurred('light');
        }

        // Обработка действий (TON / Gifts)
        function handleAction(type) {
            tg.HapticFeedback.notificationOccurred('success');
            if (type === 'ton') {
                tg.showPopup({
                    title: 'Пополнение TON',
                    message: 'Вы хотите подключить кошелек для пополнения баланса?',
                    buttons: [{id: 'ok', type: 'default', text: 'Да, продолжить'}, {type: 'cancel'}]
                });
            } else {
                tg.showAlert('Раздел Gifts позволит вам активировать бонусные коды и подарки!');
            }
        }
    </script>
</body>
</html>
