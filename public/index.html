<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0f19; --card: #161c2c; --accent: #38bdf8; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass); }
        .balance { background: var(--glass); padding: 8px 15px; border-radius: 12px; color: var(--accent); font-weight: bold; border: 1px solid rgba(56, 189, 248, 0.2); }

        .container { padding: 20px; }
        .main-case { background: var(--card); border-radius: 24px; padding: 20px; border: 1px solid var(--glass); text-align: center; }
        .case-img { width: 100%; max-width: 250px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* Выбор количества */
        .selector-label { margin: 20px 0 10px; color: #94a3b8; font-size: 14px; }
        .count-selector { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .count-btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px 18px; border-radius: 12px; cursor: pointer; transition: 0.2s; flex: 1; }
        .count-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }

        /* Кнопки действий */
        .action-btns { display: flex; flex-direction: column; gap: 10px; }
        .btn-main { background: var(--accent); color: #000; border: none; padding: 18px; border-radius: 16px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-demo { background: var(--glass); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 16px; cursor: pointer; }

        /* Наполнение */
        .items-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 30px; }
        .item-box { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 15px; font-size: 10px; border: 1px solid var(--glass); }
        .item-box img { width: 40px; height: 40px; object-fit: contain; margin-bottom: 5px; }
        .item-box b { display: block; color: var(--accent); margin-top: 3px; }

        /* Экран рулетки */
        #roulette-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
        .roulette-track { width: 300px; height: 100px; border: 2px solid var(--accent); margin: 5px; overflow: hidden; position: relative; border-radius: 12px; background: #0f172a; }
        .center-line { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: red; z-index: 5; transform: translateX(-50%); }
        .tape { display: flex; position: absolute; left: 0; height: 100%; align-items: center; }
        .tape-item { width: 100px; flex-shrink: 0; text-align: center; }
        .tape-item img { width: 60px; height: 60px; }
    </style>
</head>
<body>

    <div class="header">
        <span id="user-name" style="font-weight: bold;">CASEMONK</span>
        <div class="balance">💰 <span id="balance">0.00</span> TON</div>
    </div>

    <div class="container">
        <div class="main-case">
            <img src="BAZAITEM.jpg" class="case-img">
            <h1 style="margin: 0; font-size: 24px;">Farm Case</h1>
            
            <div class="selector-label">Выберите количество кейсов:</div>
            <div class="count-selector">
                <button class="count-btn active" onclick="setCount(1, this)">1x</button>
                <button class="count-btn" onclick="setCount(2, this)">2x</button>
                <button class="count-btn" onclick="setCount(3, this)">3x</button>
                <button class="count-btn" onclick="setCount(4, this)">4x</button>
                <button class="count-btn" onclick="setCount(5, this)">5x</button>
            </div>

            <div class="action-btns">
                <button class="btn-main" onclick="startRolling(false)">ОТКРЫТЬ ЗА <span id="total-price">1.5</span> TON</button>
                <button class="btn-demo" onclick="startRolling(true)">ДЕМО-РЕЖИМ (БЕСПЛАТНО)</button>
            </div>

            <h4 style="text-align: left; margin: 30px 0 15px; color: #94a3b8;">Содержимое кейса:</h4>
            <div class="items-grid" id="preview-grid"></div>
        </div>
    </div>

    <div id="roulette-overlay">
        <h2 id="roll-status">ОТКРЫВАЕМ...</h2>
        <div id="tracks-container"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let selectedCount = 1;
        const items = [
            { name: "Ring", price: 0.7, img: "Ring.png" },
            { name: "Trophy", price: 0.5, img: "Trophy.png" },
            { name: "1 TON", price: 1.0, img: "1 ton.jpg" },
            { name: "Ice Cream", price: 2.83, img: "https://cdn.changes.tg/gifts/ice-cream.png" },
            { name: "Fresh Socks", price: 2.97, img: "https://cdn.changes.tg/gifts/fresh-socks.png" },
            { name: "Clover Pin", price: 3.74, img: "https://cdn.changes.tg/gifts/clover-pin.png" }
        ];

        // Рендер превью предметов
        const grid = document.getElementById('preview-grid');
        items.forEach(item => {
            grid.innerHTML += `<div class="item-box"><img src="${item.img}"><div>${item.name}</div><b>${item.price} TON</b></div>`;
        });

        function setCount(num, btn) {
            selectedCount = num;
            document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('total-price').innerText = (num * 1.5).toFixed(1);
        }

        function startRolling(isDemo) {
            const overlay = document.getElementById('roulette-overlay');
            const tracksContainer = document.getElementById('tracks-container');
            tracksContainer.innerHTML = '';
            overlay.style.display = 'flex';

            for (let i = 0; i < selectedCount; i++) {
                const track = document.createElement('div');
                track.className = 'roulette-track';
                track.innerHTML = `<div class="center-line"></div><div class="tape" id="tape-${i}"></div>`;
                tracksContainer.appendChild(track);

                const tape = document.getElementById(`tape-${i}`);
                // Создаем ленту
                for (let j = 0; j < 60; j++) {
                    const itm = items[Math.floor(Math.random() * items.length)];
                    tape.innerHTML += `<div class="tape-item"><img src="${itm.img}"></div>`;
                }

                // Логика победы
                const winIdx = 55;
                const winner = items[Math.floor(Math.random() * items.length)];
                tape.children[winIdx].innerHTML = `<img src="${winner.img}">`;

                setTimeout(() => {
                    tape.style.transition = 'transform 10s cubic-bezier(0.1, 0, 0.1, 1)';
                    tape.style.transform = `translateX(-${(winIdx * 100) - 100}px)`;
                }, 100);
            }

            setTimeout(() => {
                tg.showAlert(isDemo ? "Демонстрация окончена. Предметы не начислены." : "Кейсы открыты! Предметы в профиле.");
                overlay.style.display = 'none';
            }, 10500);
        }
    </script>
</body>
</html>
