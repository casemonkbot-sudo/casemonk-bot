<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CaseMonk - Farm Case</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #1a2036 0%, #0f121d 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-blue: #246bfd;
            --accent-green: #4ade80;
            --text-main: #ffffff;
            --text-gray: #94a3b8;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
        }

        .header { display: flex; justify-content: space-between; padding: 15px 20px; align-items: center; }
        .balance-badge { background: var(--card-bg); padding: 6px 14px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); display: flex; gap: 8px; align-items: center; }

        .page { display: none; padding: 0 20px 120px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Дизайн кейса */
        .case-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 20px;
        }
        .case-img { width: 100%; max-width: 200px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }
        
        .btn-open {
            background: var(--accent-blue);
            color: white; border: none; width: 100%; padding: 15px;
            border-radius: 16px; font-weight: bold; margin-top: 15px; font-size: 16px;
        }
        .btn-demo {
            background: transparent;
            color: var(--text-gray); border: 1px solid var(--text-gray); width: 100%; padding: 10px;
            border-radius: 16px; margin-top: 10px;
        }

        /* Рулетка */
        #roulette-container {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .roulette-window {
            width: 300px; height: 120px; border: 2px solid var(--accent-blue);
            position: relative; overflow: hidden; border-radius: 15px; background: #0a0d16;
        }
        .roulette-rail {
            display: flex; position: absolute; left: 0; transition: transform 10s cubic-bezier(0.15, 0, 0.15, 1);
        }
        .item-card {
            min-width: 100px; height: 100px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 10px;
        }
        .item-card img { width: 60px; height: 60px; object-fit: contain; }
        .marker {
            position: absolute; left: 50%; top: 0; bottom: 0; width: 2px;
            background: var(--accent-green); z-index: 10; transform: translateX(-50%);
        }

        /* Инвентарь */
        .inventory-list { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .inv-item { background: var(--card-bg); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .inv-item img { width: 50px; margin-bottom: 10px; }

        /* Навигация */
        .nav-bar {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(25, 30, 48, 0.9); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; padding: 12px;
            border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-item { text-align: center; color: var(--text-gray); text-decoration: none; font-size: 11px; }
        .nav-item.active { color: white; }
        .nav-item i { display: block; font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="header">
    <div id="top-name">Loading...</div>
    <div class="balance-badge">
        <img src="https://cryptologos.cc/logos/toncoin-ton-logo.png" width="18">
        <span id="user-balance">0.1</span>
    </div>
</div>

<div id="profile-page" class="page active">
    <div style="text-align: center; padding: 20px; background: var(--card-bg); border-radius: 24px;">
        <img id="avatar" style="width: 80px; border-radius: 50%; border: 2px solid var(--accent-blue);" src="">
        <h3 id="full-name" style="margin: 10px 0 0;">User</h3>
        <div id="username" style="color: var(--text-gray); font-size: 14px;">@username</div>
    </div>

    <h3 style="margin-top: 25px;">Инвентарь</h3>
    <div id="inventory" class="inventory-list">
        <div style="grid-column: 1/3; color: var(--text-gray); text-align: center;">Пусто...</div>
    </div>
</div>

<div id="cases-page" class="page">
    <div class="case-card">
        <img src="https://i.postimg.cc/mD3mZ6mS/1000001923.jpg" class="case-img" alt="Farm Case">
        <h2 style="margin: 10px 0;">Farm Random</h2>
        <div style="color: var(--accent-green); font-weight: bold; font-size: 18px;">1.5 TON</div>
        
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 15px; font-size: 12px; color: var(--text-gray);">
            <span>💍 Ring (0.7 TON)</span>
            <span>🏆 Trophy (0.5 TON)</span>
            <span>💎 1 TON Random</span>
        </div>

        <button class="btn-open" onclick="startOpening(false)">Открыть за 1.5 TON</button>
        <button class="btn-demo" onclick="startOpening(true)">Демо режим</button>
    </div>
</div>

<div id="roulette-container">
    <h2 id="roulette-status">Открываем...</h2>
    <div class="roulette-window">
        <div class="marker"></div>
        <div id="rail" class="roulette-rail"></div>
    </div>
    <p style="color: var(--text-gray); margin-top: 20px;">Удачи!</p>
</div>

<div class="nav-bar">
    <a href="#" class="nav-item" onclick="switchTab('cases', this)">
        <i class="fa-solid fa-box"></i><span>Кейсы</span>
    </a>
    <a href="#" class="nav-item active" onclick="switchTab('profile', this)">
        <i class="fa-solid fa-user-circle"></i><span>Профиль</span>
    </a>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let balance = 0.1;
    let inventory = [];

    // Предметы
    const items = [
        { id: 'ring', name: 'Ring Random', price: 0.7, img: 'https://i.postimg.cc/B6fD6v8C/1000001919.png', weight: 40 },
        { id: 'trophy', name: 'Trophy Random', price: 0.5, img: 'https://i.postimg.cc/8zXyB6S2/1000001920.png', weight: 60 },
        { id: 'ton1', name: '1 TON Random', price: 1.0, img: 'https://i.postimg.cc/6pD6v8C/1000001918.webp', weight: 50 }
    ];

    // Инициализация данных пользователя
    const user = tg.initDataUnsafe?.user;
    if (user) {
        document.getElementById('top-name').innerText = user.first_name;
        document.getElementById('full-name').innerText = user.first_name;
        document.getElementById('username').innerText = '@' + (user.username || 'user');
        if (user.photo_url) document.getElementById('avatar').src = user.photo_url;
    }

    function switchTab(page, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(page + '-page').classList.add('active');
        el.classList.add('active');
    }

    function startOpening(isDemo) {
        if (!isDemo && balance < 1.5) {
            alert("Недостаточно баланса!");
            return;
        }

        const container = document.getElementById('roulette-container');
        const rail = document.getElementById('rail');
        container.style.display = 'flex';
        rail.style.transition = 'none';
        rail.style.transform = 'translateX(0)';
        
        // Генерируем 50 предметов для прокрутки
        rail.innerHTML = '';
        let list = [];
        for(let i=0; i<60; i++) {
            const randomItem = items[Math.floor(Math.random() * items.length)];
            list.push(randomItem);
            rail.innerHTML += `<div class="item-card"><img src="${randomItem.img}"><span>${randomItem.price} T</span></div>`;
        }

        // Выбор победителя (шансы)
        let winner;
        if (isDemo) {
            // В демо всегда выпадает что-то подороже (например 1 TON)
            winner = items[2]; 
        } else {
            const rand = Math.random() * 150;
            if (rand < 40) winner = items[0];
            else if (rand < 100) winner = items[1];
            else winner = items[2];
            balance -= 1.5;
            updateUI();
        }

        // Подменяем 55-й элемент на нашего победителя
        const winnerIdx = 55;
        rail.children[winnerIdx].innerHTML = `<img src="${winner.img}"><span>${winner.price} T</span>`;

        // Запуск анимации
        setTimeout(() => {
            rail.style.transition = 'transform 10s cubic-bezier(0.15, 0, 0.15, 1)';
            const offset = -(winnerIdx * 100) + 100; // Центрируем
            rail.style.transform = `translateX(${offset}px)`;
        }, 100);

        // Конец анимации
        setTimeout(() => {
            container.style.display = 'none';
            handleWin(winner, isDemo);
        }, 10500);
    }

    function handleWin(item, isDemo) {
        if (isDemo) {
            alert(`Демо: Вы выбили ${item.name}! (Приз не начислен)`);
            return;
        }

        const action = confirm(`Вы выбили ${item.name} (${item.price} TON)!\nПродать за ${item.price} TON? (ОК - Продать, Отмена - Оставить в инвентаре)`);
        
        if (action) {
            balance += item.price;
        } else {
            inventory.push(item);
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById('user-balance').innerText = balance.toFixed(1);
        const invDiv = document.getElementById('inventory');
        if (inventory.length === 0) {
            invDiv.innerHTML = '<div style="grid-column: 1/3; color: var(--text-gray); text-align: center;">Пусто...</div>';
        } else {
            invDiv.innerHTML = inventory.map(i => `
                <div class="inv-item">
                    <img src="${i.img}">
                    <div style="font-size: 12px;">${i.name}</div>
                    <div style="color:var(--accent-green)">${i.price} TON</div>
                </div>
            `).join('');
        }
    }
</script>
</body>
</html>
