<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CaseMonk Web App</title>
    <style>
        :root {
            --bg-color: #000000;
            --accent-blue: #007aff;
            --text-color: #ffffff;
            --card-bg: #1a1a1a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Шапка и Баланс */
        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .balance-card {
            background: var(--card-bg);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ton-icon { width: 18px; height: 18px; }

        /* Сетка инвентаря / Кейсов */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 15px;
        }

        .item-block {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            border: 1px solid #222;
            position: relative;
        }

        /* Кейс DROP */
        .case-header {
            text-align: center;
            margin: 20px 0;
        }

        .drop-title {
            font-size: 24px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .small-ton { width: 14px; height: 14px; vertical-align: middle; }

        /* Анимация рулетки */
        .roulette-wrapper {
            position: relative;
            width: 100%;
            height: 120px;
            overflow: hidden;
            background: #0a0a0a;
            margin: 20px 0;
            border-top: 1px solid var(--accent-blue);
            border-bottom: 1px solid var(--accent-blue);
        }

        .roulette-tape {
            display: flex;
            position: absolute;
            left: 0;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .tape-item {
            min-width: 100px;
            height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #222;
        }

        .pointer {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--accent-blue);
            z-index: 10;
            box-shadow: 0 0 10px var(--accent-blue);
        }

        /* Секция пополнения Gifts (Старый текст) */
        .gifts-section {
            padding: 15px;
            background: #0d0d0d;
            margin: 15px;
            border-radius: 12px;
        }

        .btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            margin: 5px 0;
            font-weight: bold;
        }

        /* Меню */
        .nav-menu {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            background: #111;
            padding: 10px 0;
            justify-content: space-around;
            border-top: 1px solid #333;
        }

        .nav-item { font-size: 12px; color: #888; text-decoration: none; text-align: center; }
        .nav-item.active { color: var(--accent-blue); }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-card">
            <span id="user-balance">10.00</span> 
            <img src="https://cryptologos.cc/logos/toncoin-ton-logo.svg" class="ton-icon" alt="TON">
        </div>
        <button onclick="changeLang()" style="background:none; border:1px solid #444; color:white; border-radius:5px; padding:5px 10px;">RU/EN</button>
    </div>

    <div class="case-header">
        <div class="drop-title">
            DROP <img src="https://cryptologos.cc/logos/toncoin-ton-logo.svg" class="small-ton">
        </div>
    </div>

    <div class="roulette-wrapper">
        <div class="pointer"></div>
        <div id="tape" class="roulette-tape"></div>
    </div>

    <div style="padding: 0 15px;">
        <button class="btn" onclick="spin()">ОТКРЫТЬ КЕЙС (1.5 TON)</button>
    </div>

    <div class="grid-container" id="case-items">
        </div>

    <div class="gifts-section">
        <h3 style="margin-top:0;">Пополнение баланса</h3>
        <p style="font-size: 13px; color: #ccc;">Отправьте Gift-код боту. После проверки баланс будет зачислен мгновенно.</p>
        <button class="btn" style="background:#222;">Активировать Gift</button>
    </div>

    <div style="padding: 15px; margin-bottom: 70px;">
        <button class="btn" style="background:#1a1a1a; border: 1px solid #333;">🎁 Ежедневный бонус</button>
        <button class="btn" style="background:#1a1a1a; border: 1px solid #333;" onclick="window.open('https://t.me/support')">👨‍💻 Поддержка</button>
    </div>

    <nav class="nav-menu">
        <div class="nav-item active">Кейсы</div>
        <div class="nav-item" onclick="showInventory()">Инвентарь</div>
        <div class="nav-item">Профиль</div>
    </nav>

    <script>
        let balance = 10.00;
        const items = [
            { name: "Common Item", price: 0.1, color: "#888" },
            { name: "Uncommon", price: 0.5, color: "#007aff" },
            { name: "Rare Item", price: 2.0, color: "#a335ee" },
            { name: "Legendary", price: 10.0, color: "#ff8000" }
        ];

        // Инициализация сетки кейса
        function initGrid() {
            const container = document.getElementById('case-items');
            container.innerHTML = '';
            items.forEach(item => {
                container.innerHTML += `
                    <div class="item-block">
                        <div style="height:40px; background:${item.color}; border-radius:5px; margin-bottom:5px;"></div>
                        <div style="font-size:10px;">${item.name}</div>
                        <div style="font-size:11px; font-weight:bold; color: #aaa;">
                            ${item.price} <img src="https://cryptologos.cc/logos/toncoin-ton-logo.svg" class="small-ton">
                        </div>
                    </div>
                `;
            });
        }

        // Предзагрузка ленты рулетки
        function initTape() {
            const tape = document.getElementById('tape');
            tape.innerHTML = '';
            for(let i = 0; i < 50; i++) {
                const item = items[Math.floor(Math.random() * items.length)];
                tape.innerHTML += `
                    <div class="tape-item" style="border-bottom: 3px solid ${item.color}">
                        <div style="width:50px; height:50px; background:${item.color}; border-radius:8px;"></div>
                        <span style="font-size:10px; margin-top:5px;">${item.name}</span>
                    </div>
                `;
            }
        }

        function spin() {
            if(balance < 1.5) return alert("Недостаточно TON");
            
            balance -= 1.5;
            document.getElementById('user-balance').innerText = balance.toFixed(2);

            const tape = document.getElementById('tape');
            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0)';
            
            setTimeout(() => {
                tape.style.transition = 'transform 5s cubic-bezier(0.15, 0, 0.15, 1)';
                const stopPos = (30 * 100) + (Math.random() * 100); 
                tape.style.transform = `translateX(-${stopPos}px)`;
            }, 50);

            setTimeout(() => {
                const wonItem = items[Math.floor(Math.random() * items.length)];
                showWinModal(wonItem);
            }, 5500);
        }

        function showWinModal(item) {
            const action = confirm(`Вы выбили: ${item.name}!\nПродать за ${item.price} TON или оставить в инвентаре? (OK - Продать, Отмена - В инвентарь)`);
            if(action) {
                balance += item.price;
                document.getElementById('user-balance').innerText = balance.toFixed(2);
                alert("Продано!");
            } else {
                alert("Предмет добавлен в инвентарь");
            }
        }

        function changeLang() {
            alert("Язык изменен / Language changed");
        }

        window.onload = () => {
            initGrid();
            initTape();
        };
    </script>
</body>
