<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CaseMonk</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #000;
            --card: #0d0d0d;
            --accent-purple: #7a3ef2;
            --accent-blue: #007aff;
            --btn-red: linear-gradient(135deg, #ff4d4d, #ff8c40);
            --border: 1px solid rgba(255, 255, 255, 0.05);
            --text-sec: #8e8e93;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }

        /* Шапка Профиля */
        .profile-header { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; border-bottom: var(--border); background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); position: fixed; top: 0; width: 100%; z-index: 100; }
        .u-info-block { display: flex; align-items: center; gap: 10px; }
        .u-ava-min { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #333; object-fit: cover; }
        .u-bal-chip { display: flex; align-items: center; gap: 5px; background: #1c1c1e; padding: 6px 12px; border-radius: 20px; font-weight: 800; font-size: 14px; }
        .btn-top-pay { background: var(--accent-purple); color: #fff; border: none; padding: 8px 15px; border-radius: 12px; font-weight: 700; font-size: 13px; }

        /* Контейнеры */
        .main-container { padding: 80px 20px 100px; height: 100vh; overflow-y: auto; display: none; flex-direction: column; }
        .main-container.active { display: flex; }

        /* Дизайн Кейса */
        .case-title { font-size: 28px; font-weight: 900; margin-bottom: 20px; }
        .roulette-container { width: 100%; height: 120px; background: #0a0a0a; border-radius: 20px; position: relative; overflow: hidden; border: var(--border); margin-bottom: 15px; }
        .center-marker { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--accent-purple); z-index: 10; box-shadow: 0 0 15px var(--accent-purple); }
        .items-tape { display: flex; align-items: center; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); will-change: transform; }
        .tape-item { min-width: 100px; height: 120px; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .tape-item img { width: 75px; height: 75px; object-fit: contain; }
        .btn-open-main { background: var(--btn-red); width: 100%; border: none; padding: 18px; border-radius: 20px; color: #fff; font-weight: 800; font-size: 17px; margin-bottom: 30px; box-shadow: 0 5px 20px rgba(255, 77, 77, 0.3); }

        /* Предметы в кейсе */
        .grid-view { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-item { background: var(--card); border-radius: 20px; padding: 15px; border: var(--border); text-align: center; position: relative; }
        .item-img { width: 80px; height: 80px; object-fit: contain; margin-bottom: 15px; }
        .item-price-tag { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 10px; font-size: 11px; font-weight: 800; display: flex; align-items: center; gap: 3px; border: var(--border); }
        .btn-random { background: #3c1e84; color: #fff; border: none; width: 100%; padding: 10px; border-radius: 12px; font-weight: 700; font-size: 13px; }

        /* Профиль и Инвентарь */
        .avatar-main { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 15px; display: block; border: 3px solid #1c1c1e; }
        .inv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .slot { aspect-ratio: 1; background: #121212; border-radius: 15px; border: 1px dashed #222; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .slot img { width: 80%; object-fit: contain; }

        /* Модалки */
        .modal { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; padding: 20px; }
        .modal.active { display: flex; }
        .m-head { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; font-weight: 700; }

        /* Навигация */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: var(--border); z-index: 90; }
        .nav-item { color: #555; text-align: center; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="u-info-block">
            <img src="https://i.ibb.co/vzB7G9Y/bear.png" class="u-ava-min" id="mini-ava">
            <span class="u-name-min" id="mini-name">nowk</span>
            <div class="u-bal-chip" onclick="openM('m-sel')">
                <img src="tonbalance001.png" width="14">
                <span id="bal-val">100.00</span>
            </div>
        </div>
        <button class="btn-top-pay" onclick="openM('m-sel')">Пополнить</button>
    </div>

    <div id="page-cases" class="main-container active">
        <h1 class="case-title">DROP</h1>
        <div class="roulette-container">
            <div class="center-marker"></div>
            <div class="items-tape" id="tape"></div>
        </div>
        <button class="btn-open-main" onclick="startSpin(false)">Открыть за 10 TON</button>
        <button class="btn-open-main" style="background:#1c1c1e; margin-top:-20px; font-size:14px;" onclick="startSpin(true)">Демо режим</button>
        
        <p style="margin: 20px 0 15px; font-weight: 700;"><i class="fa-solid fa-box-open" style="color: var(--accent-purple);"></i> Collections in this case</p>
        <div class="grid-view" id="loot-list"></div>
    </div>

    <div id="page-bonus" class="main-container">
        <h2 style="margin-bottom:20px;">Бонусы</h2>
        <div style="background:var(--card); padding:20px; border-radius:24px; border:var(--border);">
            <p style="margin-bottom:15px;">Приглашайте друзей и получайте 15% от их пополнений!</p>
            <button class="btn-open-main" onclick="inviteFriend()" style="margin-bottom:10px;">Пригласить друга</button>
            <button class="btn-open-main" style="background:#1c1c1e;" onclick="copyRef()">Скопировать ссылку</button>
        </div>
    </div>

    <div id="page-profile" class="main-container">
        <img src="https://i.ibb.co/vzB7G9Y/bear.png" class="avatar-main" id="main-ava">
        <h2 style="text-align:center; margin-bottom:5px;" id="main-name">nowk</h2>
        <p style="text-align:center; color:var(--text-sec); margin-bottom:20px;" id="main-tag">@username</p>
        
        <button class="btn-open-main" style="background:var(--accent-blue);" onclick="window.open('https://t.me/casemonk_sup_robot')">Поддержка</button>
        
        <div style="background:var(--card); padding:20px; border-radius:24px; border:var(--border); margin-top:10px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <b>Инвентарь</b> <span id="inv-count" style="color:var(--text-sec);">0</span>
            </div>
            <div class="inv-grid" id="main-inv"></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item" onclick="switchPage('cases', this)"><i class="fa-solid fa-box-open"></i>Кейсы</div>
        <div class="nav-item" onclick="switchPage('bonus', this)"><i class="fa-solid fa-gift"></i>Бонусы</div>
        <div class="nav-item" onclick="switchPage('profile', this)"><i class="fa-solid fa-user-circle"></i>Профиль</div>
    </div>

    <div id="m-sel" class="modal">
        <div class="m-head" onclick="closeM('m-sel')"><i class="fa-solid fa-chevron-left"></i> Пополнение</div>
        <div style="background:#1c1c1e; padding:18px; border-radius:16px; display:flex; justify-content:space-between; margin-bottom:12px;" onclick="openM('m-ton')">
            <span>TON Connect</span> <img src="tonbalance001.png" width="20">
        </div>
        <div style="background:#1c1c1e; padding:18px; border-radius:16px; display:flex; justify-content:space-between;" onclick="openM('m-gift')">
            <span>NFT Gifts 🎁</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const CASE_ITEMS = [
            { n: "Nail Bracelet", p: "115.83", img: "nailbracelet-1.png", s: 0.1 },
            { n: "Bonded Ring", p: "40.10", img: "bondedring-1.png", s: 0.3 },
            { n: "Signet Ring", p: "32.69", img: "signetring-1.png", s: 1 },
            { n: "Diamond Ring", p: "26.59", img: "diamondring-1.png", s: 2.5 },
            { n: "Cupid Charm", p: "20.19", img: "cupidcharm-1.png", s: 3.5 },
            { n: "Crystal Ball", p: "11.87", img: "crystalball-1.png", s: 35 },
            { n: "Love Candle", p: "10.04", img: "lovecandle-1.png", s: 40 },
            { n: "Jolly Chimp", p: "6.46", img: "jollychimp-1.png", s: 45 },
            { n: "Light Sword", p: "5.40", img: "lightsword-1.png", s: 50 },
            { n: "Snoop Dogg", p: "4.95", img: "snoopdogg-1.png", s: 55 }
        ];

        let inventory = JSON.parse(localStorage.getItem('inv') || '[]');

        function init() {
            const list = document.getElementById('loot-list');
            CASE_ITEMS.forEach(item => {
                list.innerHTML += `
                    <div class="grid-item">
                        <div class="item-price-tag"><span>${item.p}</span> <img src="tonbalance001.png" width="12"></div>
                        <img src="${item.img}" class="item-img">
                        <div class="item-name">${item.n} Random</div>
                        <button class="btn-random">Random</button>
                    </div>`;
            });
            fillTape();
            renderInv();
            
            const u = tg.initDataUnsafe.user;
            if(u) {
                document.getElementById('mini-name').innerText = u.first_name;
                document.getElementById('main-name').innerText = u.first_name;
                document.getElementById('main-tag').innerText = '@' + (u.username || 'user');
                if(u.photo_url) {
                    document.getElementById('mini-ava').src = u.photo_url;
                    document.getElementById('main-ava').src = u.photo_url;
                }
            }
        }

        function switchPage(p, el) {
            document.querySelectorAll('.main-container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            el.classList.add('active');
        }

        function openM(id){ document.getElementById(id).classList.add('active'); }
        function closeM(id){ document.getElementById(id).classList.remove('active'); }

        function fillTape() {
            const tape = document.getElementById('tape');
            tape.innerHTML = '';
            for(let i=0; i<60; i++) {
                const item = CASE_ITEMS[Math.floor(Math.random()*CASE_ITEMS.length)];
                tape.innerHTML += `<div class="tape-item"><img src="${item.img}"></div>`;
            }
        }

        let spinning = false;
        function startSpin(isDemo) {
            if(spinning) return;
            const bal = parseFloat(document.getElementById('bal-val').innerText);
            if(!isDemo && bal < 10) return tg.showAlert("Недостаточно TON!");

            spinning = true;
            if(!isDemo) updateBal(-10);
            
            const tape = document.getElementById('tape');
            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0)';
            
            const r = Math.random() * 100;
            const winner = [...CASE_ITEMS].sort((a,b)=>a.s-b.s).find(i => r <= i.s) || CASE_ITEMS[9];
            tape.children[55].innerHTML = `<img src="${winner.img}">`;

            setTimeout(() => {
                tape.style.transition = 'transform 5s cubic-bezier(0.15, 0, 0.15, 1)';
                const stopPos = (55 * 100) - (window.innerWidth / 2) + 50;
                tape.style.transform = `translateX(-${stopPos}px)`;
            }, 50);

            setTimeout(() => {
                spinning = false;
                if(isDemo) {
                    tg.showAlert("Демо-режим: Вы выиграли " + winner.n + ". На реальный баланс приз не зачислен.");
                } else {
                    inventory.push(winner);
                    localStorage.setItem('inv', JSON.stringify(inventory));
                    renderInv();
                    tg.showConfirm(`Вы выиграли ${winner.n}! Продать за ${winner.p} TON?`, (ok) => {
                        if(ok) sellItem(inventory.length - 1);
                    });
                }
            }, 5500);
        }

        function sellItem(idx) {
            const item = inventory[idx];
            updateBal(parseFloat(item.p));
            inventory.splice(idx, 1);
            localStorage.setItem('inv', JSON.stringify(inventory));
            renderInv();
        }

        function renderInv() {
            const grid = document.getElementById('main-inv');
            grid.innerHTML = '';
            inventory.forEach((it, i) => {
                grid.innerHTML += `<div class="slot" onclick="sellItem(${i})"><img src="${it.img}"></div>`;
            });
            document.getElementById('inv-count').innerText = inventory.length;
        }

        function updateBal(v) {
            const cur = parseFloat(document.getElementById('bal-val').innerText);
            document.getElementById('bal-val').innerText = (cur + v).toFixed(2);
        }

        function inviteFriend() {
            const link = "https://t.me/casemonk_robot?start=" + (tg.initDataUnsafe.user?.id || "");
            window.open(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=CaseMonk - выигрывай подарки!`);
        }

        init();
    </script>
</body>
</html>
