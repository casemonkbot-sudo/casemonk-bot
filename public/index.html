<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CaseMonk Web App</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-blue: #007aff;
            --tg-green: #76ff03;
        }

        body {
            background-color: #000000;
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #000000 70%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* АНИМАЦИЯ ПОДАРКА */
        @keyframes tg-gift-bounce {
            0% { transform: scale(1); }
            30% { transform: scale(1.1) rotate(-3deg); }
            50% { transform: scale(0.9) rotate(3deg); }
            100% { transform: scale(1) rotate(0); }
        }
        .anim-active { animation: tg-gift-bounce 0.4s ease-out; }

        /* ЭФФЕКТ ЖИДКОГО СТЕКЛА */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
        }

        /* Шапка */
        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .balance-card {
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            font-size: 18px;
        }

        /* Кейс DROP */
        .case-title {
            text-align: center;
            font-size: 26px;
            font-weight: 800;
            margin: 20px 0;
            letter-spacing: 1px;
        }

        .ton-logo { width: 20px; height: 20px; vertical-align: middle; margin-left: 5px; }

        /* Сетка инвентаря / предметов */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 15px;
        }

        .item {
            padding: 12px;
            text-align: center;
            transition: all 0.2s;
        }

        /* Склеенные кнопки как на скриншоте */
        .inv-card {
            padding: 15px;
            margin: 10px;
            text-align: center;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-top: 12px;
        }

        .btn-sell {
            background: #2c2c3e;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 15px 15px 5px 5px;
            font-weight: 600;
        }

        .btn-withdraw {
            background: var(--tg-green);
            color: black;
            border: none;
            padding: 12px;
            border-radius: 5px 5px 15px 15px;
            font-weight: bold;
        }

        /* Секция Gifts */
        .gifts-box {
            margin: 15px;
            padding: 20px;
        }

        .btn-action {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            font-weight: bold;
            margin-top: 10px;
        }

        /* Навигация */
        .nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 15px 0 25px;
            background: rgba(0,0,0,0.8);
            border-top: 1px solid #222;
        }

        .nav-item { color: #555; font-size: 12px; text-decoration: none; }
        .nav-item.active { color: white; }

    </style>
</head>
<body>

    <div class="header">
        <div class="balance-card glass">
            <span id="bal">10.00</span>
            <img src="https://cryptologos.cc/logos/toncoin-ton-logo.svg" class="ton-logo">
        </div>
        <div class="glass" style="padding: 8px 15px; font-size: 14px;">Русский</div>
    </div>

    <div class="case-title">DROP <img src="https://cryptologos.cc/logos/toncoin-ton-logo.svg" class="ton-logo"></div>

    <div class="grid" id="items-container">
        </div>

    <div style="padding: 0 15px;">
        <button class="btn-action" style="font-size: 16px;">ОТКРЫТЬ КЕЙС (1.5 TON)</button>
    </div>

    <div class="gifts-box glass">
        <div style="font-size: 13px; color: #aaa; line-height: 1.4;">
            Введите реферальный или бонусный код и получайте подарки и бонусы!
            <br><br>
            Отправьте Gift-код боту. После проверки баланс будет зачислен мгновенно.
        </div>
        <button class="btn-action" style="background: rgba(255,255,255,0.1);">Активировать Gift</button>
    </div>

    <div style="padding: 0 15px; margin-bottom: 100px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button class="btn-action glass" style="background:none; margin:0;">🎁 Бонусы</button>
        <button class="btn-action glass" style="background:none; margin:0;">👨‍💻 Поддержка</button>
    </div>

    <nav class="nav">
        <div class="nav-item active">Кейсы</div>
        <div class="nav-item">Инвентарь</div>
        <div class="nav-item">Профиль</div>
    </nav>

    <script>
        const loot = [
            { n: "Agaric", p: 4.29, c: "#ff4d4d" },
            { n: "Snoop", p: 4.56, c: "#4facfe" },
            { n: "Dryer", p: 2.10, c: "#f093fb" },
            { n: "Ice", p: 1.20, c: "#43e97b" },
            { n: "Coin", p: 0.50, c: "#f6d365" },
            { n: "Box", p: 0.10, c: "#a1c4fd" }
        ];

        function loadItems() {
            const container = document.getElementById('items-container');
            loot.forEach(item => {
                container.innerHTML += `
                    <div class="item glass" onclick="giftAnim(this)">
                        <div class="img-placeholder" style="width:100%; height:40px; background:${item.c}; border-radius:8px; margin-bottom:8px; box-shadow: 0 4px 15px ${item.c}44;"></div>
                        <div style="font-size:10px; opacity:0.7;">${item.n}</div>
                        <div style="font-size:11px; font-weight:bold; margin-top:3px;">
                            ${item.p} <img src="https://cryptologos.cc/logos/toncoin-ton-logo.svg" style="width:10px;">
                        </div>
                    </div>
                `;
            });
        }

        function giftAnim(el) {
            el.classList.remove('anim-active');
            void el.offsetWidth;
            el.classList.add('anim-active');
            
            if(window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            }
        }

        window.onload = loadItems;
    </script>
</body>
</html>
