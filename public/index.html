<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Casino App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #252525;
            --accent-blue: #007bff;
            --text-main: #ffffff;
            --text-gray: #888888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0; overflow: hidden;
        }

        /* ШАПКА (КАК НА СКРИНЕ) */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: var(--bg-color);
        }
        .user-block { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; background: #333; }
        .user-name { font-weight: bold; font-size: 16px; }
        
        .balance-block {
            background: #2b2b2b; padding: 5px 12px; border-radius: 20px;
            display: flex; align-items: center; gap: 8px; border: 1px solid #3d3d3d;
        }
        .balance-icon { width: 18px; height: 18px; }
        .balance-plus { color: #888; font-size: 18px; margin-left: 5px; }

        /* ОСНОВНОЙ КОНТЕНТ */
        .content { height: calc(100vh - 140px); overflow-y: auto; padding: 10px 15px; }
        .screen { display: none; }
        .screen.active { display: block; }

        /* КАРТОЧКИ И КОНТЕЙНЕРЫ (ИЗ ТВОИХ СКРИНОВ) */
        .card {
            background: var(--card-bg); border-radius: 18px;
            padding: 20px; margin-bottom: 15px; border: 1px solid #333;
        }
        .card-title { font-size: 20px; font-weight: bold; text-align: center; margin-bottom: 10px; }

        /* СПЕЦИАЛЬНО ДЛЯ ROCKET (КОСМОС) */
        .rocket-game-container {
            background: radial-gradient(circle at center, #1e2a44 0%, #0d0d0d 100%);
            height: 300px; border-radius: 20px; position: relative; overflow: hidden;
            border: 1px solid #333; margin-bottom: 20px;
        }
        .rocket-sprite { position: absolute; bottom: 20px; left: 20px; width: 90px; z-index: 2; }
        .multiplier-val {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 50px; font-weight: 900; z-index: 3;
        }

        /* КНОПКИ (КАК НА СКРИНЕ) */
        .main-btn {
            background: var(--accent-blue); border: none; color: white;
            width: 100%; padding: 16px; border-radius: 14px;
            font-size: 18px; font-weight: bold; cursor: pointer;
        }

        /* НИЖНЯЯ НАВИГАЦИЯ (ТОЧНО КАК НА СКРИНЕ) */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: rgba(26, 26, 26, 0.95); display: flex;
            justify-content: space-around; align-items: center;
            border-top: 1px solid #333; backdrop-filter: blur(10px);
        }
        .nav-item {
            text-align: center; color: var(--text-gray); font-size: 11px;
            text-decoration: none; display: flex; flex-direction: column; gap: 4px;
        }
        .nav-item.active { color: var(--accent-blue); }
        .nav-icon { font-size: 24px; }

        /* ИНВЕНТАРЬ (ПРОФИЛЬ) */
        .inventory-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .inventory-slot {
            background: #2a2a2a; border: 1px dashed #444; border-radius: 12px;
            aspect-ratio: 1/1.2; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-block">
            <div id="avatar-img" class="user-avatar"></div>
            <span class="user-name" id="user-nick">НИК</span>
        </div>
        <div class="balance-block">
            <img src="https://cryptologos.cc/logos/toncoin-ton-logo.png" class="balance-icon">
            <span id="balance-num">0.017</span>
            <span class="balance-plus">+</span>
        </div>
    </div>

    <div class="content">
        
        <div id="screen-play" class="screen active">
            <div class="rocket-game-container" id="field">
                <div class="multiplier-val" id="multi">x1.00</div>
                <img src="rocket_fly.png" id="rocket" class="rocket-sprite">
            </div>
            <button class="main-btn" id="action-btn" onclick="rocketAction()">Сделать ставку</button>
        </div>

        <div id="screen-profile" class="screen">
            <div style="text-align: center; margin-bottom: 20px;">
                <div class="user-avatar" style="width: 80px; height: 80px; margin: 0 auto 10px;"></div>
                <h2>НИК</h2>
            </div>
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button class="main-btn">Пополнить</button>
                <button class="main-btn" style="background:#333;">Вывести</button>
            </div>
            <h3>Ваши подарки</h3>
            <div class="inventory-grid">
                <div class="inventory-slot">📦</div>
                <div class="inventory-slot">📦</div>
                <div class="inventory-slot">📦</div>
            </div>
        </div>

        <div id="screen-tourney" class="screen">
            <div class="card">
                <div class="card-title">Ежедневный турнир</div>
                <p style="text-align: center; color: #888;">До подведения итогов осталось:</p>
                <h2 style="text-align: center; color: #ffc107;">15:02:03</h2>
            </div>
        </div>

    </div>

    <div class="nav-bar">
        <a href="#" class="nav-item" onclick="nav('screen-earn', this)">
            <span class="nav-icon">💸</span><span>Заработок</span>
        </a>
        <a href="#" class="nav-item" onclick="nav('screen-tourney', this)">
            <span class="nav-icon">🏆</span><span>Турнир</span>
        </a>
        <a href="#" class="nav-item active" onclick="nav('screen-play', this)">
            <span class="nav-icon">🎮</span><span>Играть</span>
        </a>
        <a href="#" class="nav-item" onclick="nav('screen-bonus', this)">
            <span class="nav-icon">🎁</span><span>Бонусы</span>
        </a>
        <a href="#" class="nav-item" onclick="nav('screen-profile', this)">
            <span class="nav-icon">👤</span><span>Профиль</span>
        </a>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let balance = 0.017;
        let playing = false;
        let x = 1.0;
        let loop;

        // Инициализация
        tg.expand();
        const user = tg.initDataUnsafe.user;
        if(user) {
            document.getElementById('user-nick').innerText = user.first_name.toUpperCase();
            if(user.photo_url) document.getElementById('avatar-img').style.background = `url(${user.photo_url}) center/cover`;
        }

        // Навигация
        function nav(screenId, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            el.classList.add('active');
        }

        // Логика Ракеты
        function rocketAction() {
            const btn = document.getElementById('action-btn');
            if(!playing) {
                playing = true;
                x = 1.0;
                btn.innerText = "ЗАБРАТЬ";
                btn.style.background = "#ffc107";
                
                let crash = (Math.random() * 5 + 1.1).toFixed(2);
                
                loop = setInterval(() => {
                    x += 0.02;
                    document.getElementById('multi').innerText = `x${x.toFixed(2)}`;
                    
                    let move = (x - 1) * 40;
                    document.getElementById('rocket').style.transform = `translate(${move}px, -${move}px)`;

                    if(x >= crash) {
                        clearInterval(loop);
                        playing = false;
                        document.getElementById('multi').innerText = "CRASH!";
                        document.getElementById('multi').style.color = "#ff4444";
                        setTimeout(reset, 2000);
                    }
                }, 100);
            } else {
                clearInterval(loop);
                playing = false;
                balance += (0.01 * x);
                document.getElementById('balance-num').innerText = balance.toFixed(3);
                tg.showAlert(`Вы выиграли! Новый баланс: ${balance.toFixed(3)} TON`);
                reset();
            }
        }

        function reset() {
            const btn = document.getElementById('action-btn');
            btn.innerText = "Сделать ставку";
            btn.style.background = "#007bff";
            document.getElementById('multi').style.color = "white";
            document.getElementById('multi').innerText = "x1.00";
            document.getElementById('rocket').style.transform = "translate(0,0)";
        }
    </script>
</body>
</html>
