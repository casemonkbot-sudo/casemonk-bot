<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Case & Rocket</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-green: #4caf50; --bg-dark: #121212; --card-bg: #1e1e1e; }
        body { background: var(--bg-dark); color: white; font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; }

        /* НАВИГАЦИЯ */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: #1c1c1c;
            display: flex; justify-content: space-around; padding: 10px 0;
            border-top: 1px solid #333; z-index: 1000;
        }
        .nav-item { color: #777; font-size: 12px; text-decoration: none; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--main-green); }

        /* ЭКРАНЫ */
        .screen { display: none; height: 100vh; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .screen.active { display: block; }

        /* ДИЗАЙН РЕЖИМА ROCKET (ПО ТВОЕМУ ПРИМЕРУ) */
        .rocket-game-area {
            background: radial-gradient(circle at center, #1a2a44 0%, #0d0d0d 100%);
            height: 300px; border-radius: 20px; position: relative;
            overflow: hidden; border: 1px solid #2a2a2a; margin-top: 10px;
        }
        .multiplier {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 48px; font-weight: 900; z-index: 10; text-shadow: 0 0 20px rgba(76,175,80,0.5);
        }
        .rocket-img {
            position: absolute; bottom: 20px; left: 20px; width: 80px;
            transition: transform 0.1s linear; z-index: 5;
        }
        .crash-text { color: #ff4444; display: none; }

        /* СТАВКИ И ИСТОРИЯ */
        .bet-controls { display: flex; gap: 10px; margin-top: 15px; }
        input { background: #252525; border: 1px solid #333; color: white; padding: 10px; border-radius: 8px; flex: 1; }
        .btn-bet { background: var(--main-green); border: none; color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; }

        .history-list { background: #1c1c1c; border-radius: 12px; margin-top: 15px; padding: 10px; }
        .history-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #2a2a2a; font-size: 14px; }
        .status-win { color: var(--main-green); }
        .status-loss { color: #ff4444; }

        /* СТИЛЬ КЕЙСОВ (СТАРЫЙ) */
        .cases-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .case-card { background: var(--card-bg); border-radius: 12px; padding: 15px; text-align: center; border: 1px solid #2a2a2a; }
        .case-card img { width: 100%; max-width: 100px; }
    </style>
</head>
<body>

    <div id="screen-cases" class="screen active">
        <div style="padding-bottom: 20px;">
            <h2>Баланс: <span id="balance">1000</span> ₽</h2>
        </div>
        <div class="cases-grid">
            <div class="case-card">
                <img src="case1.png">
                <p>Классика</p>
                <button class="btn-bet" style="width: 100%">100 ₽</button>
            </div>
        </div>
    </div>

    <div id="screen-modes" class="screen">
        <div class="rocket-game-area" id="game-bg">
            <div class="multiplier" id="multi-text">x1.00</div>
            <img src="rocket_fly.png" id="rocket-sprite" class="rocket-img">
        </div>

        <div class="bet-controls">
            <input type="number" id="bet-amount" placeholder="Сумма ставки" value="100">
            <button class="btn-bet" id="btn-action" onclick="handleRocketAction()">ПОСТАВИТЬ</button>
        </div>

        <div class="history-list" id="history-box">
            <span style="color: #777; font-size: 12px;">ИСТОРИЯ СТАВОК (LIVE)</span>
            <div id="history-items"></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showScreen('screen-cases', this)">Кейсы</div>
        <div class="nav-item" onclick="showScreen('screen-modes', this)">🚀 Ракета</div>
        <div class="nav-item" onclick="showScreen('screen-profile', this)">Профиль</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let balance = 1000;
        let isGaming = false;
        let currentMulti = 1.00;
        let gameInterval;
        let crashPoint = 0;
        let betPlaced = false;

        function showScreen(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function handleRocketAction() {
            const btn = document.getElementById('btn-action');
            const betInput = document.getElementById('bet-amount');
            const amount = parseInt(betInput.value);

            if (!isGaming && !betPlaced) {
                // Ставим ставку
                if (balance < amount) return alert("Мало денег!");
                balance -= amount;
                updateBalance();
                betPlaced = true;
                btn.innerText = "ОЖИДАНИЕ...";
                startRound();
            } else if (isGaming && betPlaced) {
                // Забираем деньги
                const win = Math.floor(amount * currentMulti);
                balance += win;
                updateBalance();
                addHistory(amount, currentMulti, 'win');
                resetGame("ВЫ ЗАБРАЛИ: " + win + " ₽");
            }
        }

        function startRound() {
            isGaming = true;
            currentMulti = 1.00;
            crashPoint = (Math.random() * (15 - 1.01) + 1.01).toFixed(2);
            document.getElementById('btn-action').innerText = "ЗАБРАТЬ";
            document.getElementById('btn-action').style.background = "#ff9800";
            
            const rocket = document.getElementById('rocket-sprite');
            const text = document.getElementById('multi-text');

            gameInterval = setInterval(() => {
                currentMulti += 0.01;
                text.innerText = "x" + currentMulti.toFixed(2);
                text.style.color = "white";

                // Анимация полета
                let move = (currentMulti - 1) * 20;
                rocket.style.transform = `translate(${move}px, -${move}px) rotate(-10deg)`;

                if (currentMulti >= crashPoint) {
                    clearInterval(gameInterval);
                    text.innerText = "CRASH!";
                    text.style.color = "#ff4444";
                    if (betPlaced) addHistory(document.getElementById('bet-amount').value, currentMulti, 'loss');
                    resetGame("ВЗРЫВ!");
                }
            }, 50);
        }

        function resetGame(msg) {
            isGaming = false;
            betPlaced = false;
            clearInterval(gameInterval);
            const btn = document.getElementById('btn-action');
            btn.innerText = "ПОСТАВИТЬ";
            btn.style.background = "#4caf50";
            setTimeout(() => {
                document.getElementById('rocket-sprite').style.transform = "translate(0,0)";
                document.getElementById('multi-text').innerText = "x1.00";
            }, 2000);
        }

        function addHistory(bet, multi, status) {
            const container = document.getElementById('history-items');
            const item = document.createElement('div');
            item.className = 'history-item';
            const colorClass = status === 'win' ? 'status-win' : 'status-loss';
            item.innerHTML = `
                <span>Игрок (You)</span>
                <span>${bet} ₽</span>
                <span class="${colorClass}">x${multi.toFixed(2)}</span>
            `;
            container.prepend(item);
        }

        function updateBalance() {
            document.getElementById('balance').innerText = balance;
        }

        tg.expand();
    </script>
</body>
</html>
