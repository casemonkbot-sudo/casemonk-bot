<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Case Monk Profile</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f111a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-blue: #248bf2;
            --error: #eb4d4b;
            --success: #6ab04c;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-dark);
            color: white; font-family: 'Inter', sans-serif; overflow-x: hidden;
        }

        /* Шапка */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; position: sticky; top: 0; z-index: 10;
        }
        .brand { font-weight: 800; font-size: 18px; opacity: 0.5; }
        .balance-box {
            background: var(--glass); border: 1px solid var(--glass-border);
            padding: 6px 12px; border-radius: 100px; display: flex; align-items: center; gap: 8px;
        }
        .add-icon { background: white; color: black; border-radius: 50%; width: 16px; height: 16px; 
                    display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; }

        /* Карта профиля */
        .profile-card {
            background: var(--glass); border: 1px solid var(--glass-border);
            margin: 16px; border-radius: 20px; padding: 20px; text-align: center;
            backdrop-filter: blur(10px);
        }
        .user-avatar { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 8px; }
        .username { font-size: 14px; color: #aaa; margin: 0; }
        .nickname { font-size: 20px; font-weight: 600; margin: 4px 0 16px 0; }
        .btn-support {
            background: var(--accent-blue); color: white; border: none; width: 100%;
            padding: 12px; border-radius: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        /* Промокод */
        .promo-card {
            background: var(--glass); border: 1px solid var(--glass-border);
            margin: 16px; border-radius: 20px; padding: 20px;
        }
        .promo-title { font-weight: 600; margin-bottom: 4px; }
        .promo-desc { font-size: 12px; color: #888; margin-bottom: 12px; }
        .promo-input-row { display: flex; gap: 8px; }
        input {
            flex: 1; background: #161922; border: 1px solid #2a2d37;
            border-radius: 10px; color: white; padding: 12px; outline: none;
        }
        .btn-apply { background: #58cc02; color: black; border: none; padding: 0 16px; border-radius: 10px; font-weight: 800; }
        #promo-msg { font-size: 12px; text-align: center; margin-top: 8px; display: none; }

        /* Язык */
        .lang-row { display: flex; gap: 10px; margin: 16px; }
        .lang-btn {
            flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--glass-border);
            background: var(--glass); color: #888; text-align: center;
        }
        .lang-btn.active { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }

        /* Инвентарь */
        .inventory-section { margin: 16px; }
        .inventory-label { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
        .inventory-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .slot { aspect-ratio: 1; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; }

        /* Навигация (Жидкое стекло) */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: rgba(15, 17, 26, 0.8); backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-item { text-align: center; color: #555; font-size: 10px; }
        .nav-item.active { color: white; }
        .nav-item img { width: 24px; opacity: 0.5; margin-bottom: 4px; }
        .nav-item.active img { opacity: 1; }

        /* Модалка пополнения */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 100; display: none;
        }
        .payment-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 16px; }
        .pay-card {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 15px; padding: 20px; text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">CASE MONK!</div>
        <div class="balance-box" onclick="showModal('pay-modal')">
            <img src="ton.webp" width="16">
            <span id="user-balance">0.00</span>
            <div class="add-icon">+</div>
        </div>
    </div>

    <div id="main-profile">
        <div class="profile-card">
            <img id="tg-photo" class="user-avatar" src="ton.webp">
            <div id="tg-username" class="username">@username</div>
            <div id="tg-nickname" class="nickname">Никнейм</div>
            <button class="btn-support" onclick="window.location.href='https://t.me/casemonk_sup_bot'">
                <img src="https://img.icons8.com/ios-glyphs/20/ffffff/appointment-reminders.png"/> Поддержка
            </button>
        </div>

        <div class="promo-card">
            <div id="promo-msg"></div>
            <div class="promo-title">Активировать промокод</div>
            <div class="promo-desc">Вводите реферальный или бонусный промокод и получайте подарки и бонусы</div>
            <div class="promo-input-row">
                <input type="text" id="promo-input" placeholder="Введите промокод">
                <button class="btn-apply" onclick="applyPromo()">Применить</button>
            </div>
        </div>

        <div class="lang-row">
            <div class="lang-btn" id="en-btn" onclick="setLang('en')">English</div>
            <div class="lang-btn active" id="ru-btn" onclick="setLang('ru')">Русский</div>
        </div>

        <div class="inventory-section">
            <div class="inventory-label">Инвентарь <span style="color:#555">0</span></div>
            <div class="inventory-grid" id="inv-grid">
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item"><img src="https://img.icons8.com/ios-glyphs/30/ffffff/controller.png"/><br>Режимы</div>
        <div class="nav-item"><img src="https://img.icons8.com/ios-glyphs/30/ffffff/box.png"/><br>Кейсы</div>
        <div class="nav-item"><img src="https://img.icons8.com/ios-glyphs/30/ffffff/gift.png"/><br>Бонусы</div>
        <div class="nav-item active"><img src="https://img.icons8.com/ios-glyphs/30/ffffff/user.png"/><br>Профиль</div>
    </div>

    <div id="pay-modal" class="modal">
        <div style="padding: 20px; display: flex; align-items: center; gap: 15px;">
            <span onclick="hideModal('pay-modal')" style="font-size: 24px;">←</span>
            <span style="font-weight: 600; font-size: 18px;">Пополнение</span>
        </div>
        <div class="payment-grid">
            <div class="pay-card" onclick="showTonPay()">
                <img src="ton.webp" width="30"><br><br>TON
            </div>
            <div class="pay-card" onclick="showGiftPay()">
                <img src="https://img.icons8.com/color/30/gift.png" width="30"><br><br>Gifts
            </div>
        </div>
    </div>

    <div id="ton-input-modal" class="modal">
        <div style="padding: 20px; display:flex; align-items:center; gap:15px;">
            <span onclick="showModal('pay-modal')" style="font-size: 24px;">←</span>
            <span style="font-weight: 600;">Пополнение TON</span>
        </div>
        <div style="padding: 20px;">
            <div style="color: #888; margin-bottom: 8px;">Введите сумму</div>
            <input type="number" id="ton-amount" placeholder="100" style="width: 90%; font-size: 18px;">
            <button id="btn-ton-action" onclick="processTon()" style="background:var(--accent-blue); color:white; border:none; width:100%; padding:15px; border-radius:12px; margin-top:20px; font-weight:600;">Привязать кошелек</button>
            <button id="btn-disconnect" onclick="disconnect()" style="display:none; background:none; border:1px solid #333; color:#888; width:100%; padding:10px; border-radius:12px; margin-top:10px;">Disconnect wallet</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Загрузка данных из ТГ
        document.getElementById('tg-username').innerText = "@" + (tg.initDataUnsafe?.user?.username || "username");
        document.getElementById('tg-nickname').innerText = tg.initDataUnsafe?.user?.first_name || "Никнейм";
        if(tg.initDataUnsafe?.user?.photo_url) {
            document.getElementById('tg-photo').src = tg.initDataUnsafe.user.photo_url;
        }

        let isWalletConnected = false;

        function applyPromo() {
            const val = document.getElementById('promo-input').value;
            const msg = document.getElementById('promo-msg');
            msg.style.display = 'block';
            
            if(val === "EXPIRED") {
                msg.innerText = "промокод закончился";
                msg.style.color = "var(--error)";
            } else if(val === "VALID") {
                msg.innerText = "промокод успешно активирован";
                msg.style.color = "var(--success)";
            } else {
                msg.innerText = "промокод не существует";
                msg.style.color = "var(--error)";
            }
        }

        function setLang(lang) {
            document.getElementById('ru-btn').classList.toggle('active', lang === 'ru');
            document.getElementById('en-btn').classList.toggle('active', lang === 'en');
        }

        function showModal(id) { 
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            document.getElementById(id).style.display = 'block'; 
        }
        function hideModal(id) { document.getElementById(id).style.display = 'none'; }

        function showTonPay() { showModal('ton-input-modal'); }

        function processTon() {
            if(!isWalletConnected) {
                isWalletConnected = true;
                document.getElementById('btn-ton-action').innerText = "Пополнить";
                document.getElementById('btn-disconnect').style.display = "block";
            } else {
                const amt = parseFloat(document.getElementById('ton-amount').value);
                if(amt < 0.1 || isNaN(amt)) {
                    alert("Ошибка Пополнение от 0.10 тон.");
                } else {
                    tg.showPopup({
                        title: 'Оплата',
                        message: 'Переведите ' + amt + ' TON на: UQCZVO12gl7nNHEPgup58ZdlUJQIg7ANsuNIo73CYMaRyZzZ',
                        buttons: [{type: 'close'}]
                    });
                }
            }
        }

        function disconnect() {
            isWalletConnected = false;
            document.getElementById('btn-ton-action').innerText = "Привязать кошелек";
            document.getElementById('btn-disconnect').style.display = "none";
        }

        function showGiftPay() {
            tg.showPopup({
                title: 'Gifts Пополнение',
                message: 'Отправьте NFT подарок боту @casemonk_relayer. Модель и фон не важны.',
                buttons: [{type: 'ok', text: 'Перейти'}]
            });
        }
    </script>
</body>
</html>
