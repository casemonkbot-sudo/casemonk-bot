<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-bg: #0b0f19; --card-bg: #161c2c; --accent: #38bdf8; --text-gray: #94a3b8; }
        body { background: var(--main-bg); color: white; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding-bottom: 90px; user-select: none; }
        
        /* Шапка */
        .header { display: flex; justify-content: space-between; padding: 15px; align-items: center; position: sticky; top: 0; background: rgba(11, 15, 25, 0.8); backdrop-filter: blur(10px); z-index: 100; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-info img { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--accent); }
        .balance-block { background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.3); padding: 5px 12px; border-radius: 20px; display: flex; align-items: center; gap: 8px; color: var(--accent); font-weight: bold; }

        /* Контент */
        .container { padding: 15px; }
        .tab-content { display: none; animation: slideUp 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Дизайн Профиля (как на скрине) */
        .profile-header { background: var(--card-bg); border-radius: 25px; padding: 30px 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .main-avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--accent); margin-bottom: 15px; }
        .btn-support { background: #2563eb; color: white; border: none; width: 100%; padding: 14px; border-radius: 15px; font-weight: bold; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; }

        /* Промокод */
        .promo-section { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-top: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .input-group { display: flex; gap: 10px; margin-top: 10px; }
        input { background: #0b0f19; border: 1px solid #2d3748; color: white; padding: 12px; border-radius: 12px; flex: 1; outline: none; }
        .btn-apply { background: #22c55e; color: white; border: none; padding: 0 20px; border-radius: 12px; font-weight: bold; }

        /* Кейсы */
        .case-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .case-item { background: var(--card-bg); border-radius: 25px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .case-item img { width: 100%; height: 200px; object-fit: cover; }
        .case-info { padding: 15px; text-align: center; }

        /* Навигация (Нижняя) */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #161c2c; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-item { color: var(--text-gray); text-align: center; font-size: 11px; flex: 1; transition: 0.3s; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 5px; }
        .nav-item.active { color: var(--accent); }

        /* Админка */
        .admin-panel { background: #7f1d1d; padding: 20px; border-radius: 20px; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-info">
            <img id="header-avatar" src="" style="display:none">
            <span id="header-name">Загрузка...</span>
        </div>
        <div class="balance-block" id="admin-trigger">
            <i class="fa-solid fa-gem"></i>
            <span id="balance-val">0.1</span>
            <i class="fa-solid fa-plus"></i>
        </div>
    </div>

    <div class="container">
        <div id="tab-cases" class="tab-content active">
            <div class="case-grid">
                <div class="case-item">
                    <img src="BAZAITEM.jpg">
                    <div class="case-info">
                        <h3>Farm Case</h3>
                        <p style="color:var(--accent)">1.5 TON</p>
                        <button class="btn-support" style="background:var(--accent); color:black" onclick="openCase()">Открыть</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-profile" class="tab-content">
            <div class="profile-header">
                <img id="profile-avatar" class="main-avatar" src="">
                <h2 id="profile-name">User</h2>
                <p style="color:var(--text-gray)">@<span id="profile-username">username</span></p>
                <a href="https://t.me/casemonk_sup_robot" class="btn-support">
                    <i class="fa-solid fa-headset"></i> Поддержка
                </a>
            </div>

            <div class="promo-section">
                <h4>Активировать промокод</h4>
                <div class="input-group">
                    <input type="text" id="promo-input" placeholder="Введите промокод">
                    <button class="btn-apply">Применить</button>
                </div>
            </div>

            <div id="admin-panel" class="admin-panel">
                <h3>🛠 Админ Панель</h3>
                <p>Баланс: <input type="number" id="adm-set-bal" step="0.1"></p>
                <button class="btn-apply" onclick="saveAdmin()">Сохранить</button>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item" onclick="switchTab('modes', this)"><i class="fa-solid fa-gamepad"></i>Режимы</div>
        <div class="nav-item active" onclick="switchTab('cases', this)"><i class="fa-solid fa-box-open"></i>Кейсы</div>
        <div class="nav-item" onclick="switchTab('bonuses', this)"><i class="fa-solid fa-gift"></i>Бонусы</div>
        <div class="nav-item" onclick="switchTab('profile', this)"><i class="fa-solid fa-circle-user"></i>Профиль</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const MY_ID = 999313063; // Твой ID

        // Инициализация
        const user = tg.initDataUnsafe?.user;
        if(user) {
            document.getElementById('header-name').innerText = user.first_name;
            document.getElementById('profile-name').innerText = user.first_name;
            document.getElementById('profile-username').innerText = user.username || user.id;
            if(user.photo_url) {
                document.getElementById('header-avatar').src = user.photo_url;
                document.getElementById('header-avatar').style.display = 'block';
                document.getElementById('profile-avatar').src = user.photo_url;
            }
            
            // Проверка на админа
            if(user.id === MY_ID) {
                document.getElementById('admin-panel').style.display = 'block';
                tg.showAlert("Привет, Босс! Админка доступна в профиле.");
            }
        }

        function switchTab(tab, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            const target = document.getElementById('tab-' + tab);
            if(target) target.classList.add('active');
            el.classList.add('active');
        }

        function saveAdmin() {
            const val = document.getElementById('adm-set-bal').value;
            document.getElementById('balance-val').innerText = val;
            tg.showScanQrPopup({text: "Сохранение настроек..."});
            setTimeout(() => tg.closeScanQrPopup(), 1000);
        }

        function openCase() {
            tg.showConfirm("Открыть Farm Case?");
        }
    </script>
</body>
</html>
