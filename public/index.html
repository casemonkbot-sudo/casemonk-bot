<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Case Monk</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-blue: #007AFF;
            --accent-green: #4CD964;
            --error-red: #FF3B30;
            --text-main: #ffffff;
        }

        body {
            margin: 0; padding: 0;
            background: #050505; /* Глубокий черный */
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Верхняя панель */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px;
        }
        .brand-logo {
            font-weight: 800; font-size: 18px; letter-spacing: 1px;
            background: linear-gradient(to right, #fff, #555);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .balance-pill {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            padding: 6px 12px; border-radius: 20px; display: flex; align-items: center; gap: 8px;
            backdrop-filter: blur(10px);
        }
        .add-btn { color: white; background: none; border: none; font-size: 20px; cursor: pointer; padding: 0 5px; }

        /* Профиль */
        .profile-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            margin: 15px; border-radius: 24px; padding: 25px; text-align: center;
            backdrop-filter: blur(15px);
        }
        .avatar { width: 90px; height: 90px; border-radius: 50%; margin-bottom: 15px; border: 2px solid var(--accent-blue); }
        .user-info h2 { margin: 5px 0; font-size: 22px; }
        .user-info p { color: #888; margin: 0 0 15px 0; }
        .btn-support {
            background: var(--accent-blue); color: white; border: none; width: 100%;
            padding: 12px; border-radius: 14px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        /* Промокод */
        .promo-section {
            margin: 15px; background: var(--glass-bg); border: 1px solid var(--glass-border);
            padding: 20px; border-radius: 20px;
        }
        .input-group { display: flex; gap: 10px; margin-top: 10px; }
        input {
            flex: 1; background: rgba(0,0,0,0.3); border: 1px solid #333;
            color: white; padding: 12px; border-radius: 12px; outline: none;
        }
        .btn-apply { background: var(--accent-green); border: none; padding: 0 20px; border-radius: 12px; color: black; font-weight: bold; }
        .status-msg { font-size: 12px; margin-top: 8px; display: none; text-align: center; }

        /* Инвентарь */
        .inventory-header { display: flex; justify-content: space-between; padding: 0 20px; margin-top: 25px; }
        .inventory-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px;
        }
        .inv-slot {
            aspect-ratio: 1/1; background: var(--glass-bg); border: 1px dashed #333;
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
        }

        /* Нижнее меню (Жидкое стекло) */
        .nav-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(25px); border: 1px solid var(--glass-border);
            border-radius: 25px; display: flex; justify-content: space-around; padding: 12px 0;
            z-index: 100;
        }
        .nav-item { color: #777; font-size: 11px; text-align: center; }
        .nav-item.active { color: white; }
        .nav-item svg { display: block; margin: 0 auto 4px; width: 22px; }

        /* Пополнение модалка */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 200; display: none; padding: 20px;
        }
        .payment-option {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            padding: 20px; border-radius: 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand-logo">CASE MONK!</div>
        <div class="balance-pill" onclick="openDeposit()">
            <img src="ton.webp" width="18">
            <span id="header-balance">0.00</span>
            <span class="add-btn">+</span>
        </div>
    </div>

    <div id="screen-profile">
        <div class="profile-card">
            <img id="user-avatar" class="avatar" src="https://via.placeholder.com/100">
            <div class="user-info">
                <h2 id="user-name">Загрузка...</h2>
                <p id="user-tag">@username</p>
                <button class="btn-support" onclick="window.open('https://t.me/casemonk_sup_bot')">
                    🔔 Поддержка
                </button>
            </div>
        </div>

        <div class="promo-section">
            <div style="font-size: 14px; font-weight: bold;">Активировать промокод</div>
            <div style="font-size: 12px; color: #888;">Вводите бонусный промокод для подарков</div>
            <div id="promo-error" class="status-msg"></div>
            <div class="input-group">
                <input type="text" id="promo-input" placeholder="Введите промокод">
                <button class="btn-apply" onclick="checkPromo()">Применить</button>
            </div>
        </div>

        <div style="display: flex; gap: 10px; padding: 0 15px;">
            <button onclick="setLang('ru')" id="lang-ru" style="flex:1; padding:10px; border-radius:12px; border:1px solid #333; background: #111; color:white;">Русский</button>
            <button onclick="setLang('en')" id="lang-en" style="flex:1; padding:10px; border-radius:12px; border:1px solid #333; background: #111; color:white;">English</button>
        </div>

        <div class="inventory-header">
            <span style="font-weight: bold;">Инвентарь</span>
            <span id="inv-count" style="color: #888;">0</span>
        </div>
        <div class="inventory-grid" id="inventory-container">
            <div class="inv-slot"></div>
            <div class="inv-slot"></div>
            <div class="inv-slot"></div>
        </div>
    </div>

    <div id="deposit-modal" class="modal">
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:30px;">
            <button onclick="closeDeposit()" style="background:none; border:none; color:white; font-size:24px;">←</button>
            <h2 style="margin:0;">Пополнение</h2>
        </div>
        
        <div class="payment-option" onclick="openTonPay()">
            <img src="ton.webp" width="30">
            <div>
                <div style="font-weight:bold;">TON</div>
                <div style="font-size:12px; color:#888;">Прямой перевод или кошелек</div>
            </div>
        </div>

        <div class="payment-option" onclick="openGiftPay()">
            <img src="gift_icon.png" width="30">
            <div>
                <div style="font-weight:bold;">Gifts</div>
                <div style="font-size:12px; color:#888;">Пополнение NFT подарками</div>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item">Кейсы</div>
        <div class="nav-item">Бонусы</div>
        <div class="nav-item active">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            Профиль
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Данные пользователя
        document.getElementById('user-name').innerText = tg.initDataUnsafe?.user?.first_name || "Пользователь";
        document.getElementById('user-tag').innerText = "@" + (tg.initDataUnsafe?.user?.username || "username");
        if(tg.initDataUnsafe?.user?.photo_url) {
            document.getElementById('user-avatar').src = tg.initDataUnsafe.user.photo_url;
        }

        // Логика промокодов
        function checkPromo() {
            const input = document.getElementById('promo-input').value;
            const error = document.getElementById('promo-error');
            error.style.display = 'block';

            if(input === "NEW") {
                error.style.color = var(--accent-green);
                error.innerText = "Промокод успешно активирован!";
            } else if(input === "OLD") {
                error.style.color = var(--error-red);
                error.innerText = "Промокод закончился";
            } else {
                error.style.color = var(--error-red);
                error.innerText = "Промокод не существует";
            }
        }

        // Смена языка
        function setLang(lang) {
            document.getElementById('lang-ru').style.borderColor = lang === 'ru' ? '#007AFF' : '#333';
            document.getElementById('lang-en').style.borderColor = lang === 'en' ? '#007AFF' : '#333';
            // Логика смены текстов во всем приложении...
        }

        // Пополнение
        function openDeposit() { document.getElementById('deposit-modal').style.display = 'block'; }
        function closeDeposit() { document.getElementById('deposit-modal').style.display = 'none'; }

        function openTonPay() {
            // Здесь будет логика привязки кошелька и поле ввода суммы
            tg.showPopup({
                title: 'Пополнение TON',
                message: 'Переведите на: UQCZVO12gl7nNHEPgup58ZdlUJQIg7ANsuNIo73CYMaRyZzZ\nМинимум 0.10 TON',
                buttons: [{type: 'close'}]
            });
        }

        function openGiftPay() {
             tg.showPopup({
                title: 'Пополнение Gifts',
                message: 'Отправьте подарок на @casemonk_relayer. Баланс пополнится мгновенно.',
                buttons: [{type: 'ok', text: 'Перейти'}]
            });
        }
    </script>
</body>
</html>
