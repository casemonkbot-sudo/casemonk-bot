<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CaseMonk App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* Темно-светлый градиент фона */
            --bg-color: #121624;
            --bg-gradient: linear-gradient(180deg, #1a2036 0%, #0f121d 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-blue: #246bfd;
            --accent-green: #4ade80;
            --text-main: #ffffff;
            --text-gray: #94a3b8;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
        }

        /* Шапка с балансом */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .balance-badge {
            background: var(--card-bg);
            padding: 6px 14px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .page { display: none; padding: 0 20px 120px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Карточка профиля */
        .profile-card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 30px 20px;
            text-align: center;
            margin-top: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid var(--accent-blue);
            margin-bottom: 15px;
            object-fit: cover;
        }

        .btn-support {
            background: var(--accent-blue);
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            border-radius: 16px;
            margin-top: 20px;
            font-weight: 600;
        }

        /* Промокод */
        .promo-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .input-group {
            display: flex;
            background: #0a0d16;
            border-radius: 12px;
            padding: 5px;
            margin-top: 15px;
        }

        input {
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            flex-grow: 1;
            outline: none;
        }

        .btn-apply {
            background: var(--accent-green);
            color: #000;
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            font-weight: bold;
        }

        /* Язык */
        .lang-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 25px;
        }

        .lang-tabs {
            display: flex;
            background: rgba(0,0,0,0.2);
            padding: 4px;
            border-radius: 12px;
        }

        .lang-btn {
            padding: 6px 16px;
            border-radius: 8px;
            color: var(--text-gray);
            font-size: 14px;
        }

        .lang-btn.active {
            background: var(--accent-blue);
            color: white;
        }

        /* Навигация */
        .nav-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(25, 30, 48, 0.9);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .nav-item {
            text-align: center;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 11px;
            transition: 0.3s;
        }

        .nav-item.active { color: white; transform: translateY(-3px); }
        .nav-item i { display: block; font-size: 22px; margin-bottom: 4px; }

    </style>
</head>
<body>

<div class="header">
    <div id="top-name" style="font-weight: 600;">Loading...</div>
    <div class="balance-badge">
        <img src="https://cryptologos.cc/logos/toncoin-ton-logo.png" width="18">
        <span>0.1</span>
        <span style="color: var(--accent-blue);">+</span>
    </div>
</div>

<div id="profile-page" class="page active">
    <div class="profile-card">
        <img id="avatar" class="avatar" src="https://via.placeholder.com/100">
        <div id="username" style="color: var(--text-gray);">@username</div>
        <div id="full-name" style="font-size: 22px; font-weight: bold; margin-top: 5px;">User Name</div>
        
        <a href="https://t.me/casemonk_sup_robot" class="btn-support">
            <i class="fa-solid fa-comment-dots"></i> <span class="tr" data-key="support">Поддержка</span>
        </a>
    </div>

    <div class="promo-card">
        <div class="tr" data-key="promo_title" style="font-weight: bold;">Активировать промокод</div>
        <div class="tr" data-key="promo_desc" style="font-size: 13px; color: var(--text-gray); margin-top: 5px;">Вводите реферальный или бонусный промокод</div>
        <div class="input-group">
            <input type="text" placeholder="...">
            <button class="btn-apply tr" data-key="apply">Применить</button>
        </div>
    </div>

    <div class="lang-container">
        <span class="tr" data-key="lang">Язык:</span>
        <div class="lang-tabs">
            <div class="lang-btn" id="en-btn" onclick="changeLang('en')">English</div>
            <div class="lang-btn active" id="ru-btn" onclick="changeLang('ru')">Русский</div>
        </div>
    </div>
</div>

<div id="cases-page" class="page">
    <h2 class="tr" data-key="nav_cases">Кейсы</h2>
    <div style="text-align: center; margin-top: 60px; color: var(--text-gray);">
        <i class="fa-solid fa-box-open" style="font-size: 50px; opacity: 0.5;"></i>
        <p class="tr" data-key="empty">Кейсы скоро появятся</p>
    </div>
</div>

<div class="nav-bar">
    <a href="javascript:void(0)" class="nav-item" onclick="switchTab('cases', this)">
        <i class="fa-solid fa-shapes"></i>
        <span class="tr" data-key="nav_cases">Кейсы</span>
    </a>
    <a href="javascript:void(0)" class="nav-item active" onclick="switchTab('profile', this)">
        <i class="fa-solid fa-user-circle"></i>
        <span class="tr" data-key="nav_profile">Профиль</span>
    </a>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.backgroundColor = '#121624';
    tg.headerColor = '#1a2036';

    // Загрузка данных
    const user = tg.initDataUnsafe?.user;
    if (user) {
        document.getElementById('top-name').innerText = user.first_name;
        document.getElementById('full-name').innerText = user.first_name + (user.last_name ? ' ' + user.last_name : '');
        document.getElementById('username').innerText = user.username ? '@' + user.username : '';
        if (user.photo_url) document.getElementById('avatar').src = user.photo_url;
    }

    function switchTab(page, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(page + '-page').classList.add('active');
        el.classList.add('active');
    }

    const translations = {
        ru: { support: "Поддержка", promo_title: "Активировать промокод", promo_desc: "Вводите реферальный или бонусный промокод", apply: "Применить", lang: "Язык:", nav_cases: "Кейсы", nav_profile: "Профиль", empty: "Кейсы скоро появятся" },
        en: { support: "Support", promo_title: "Activate promo code", promo_desc: "Enter a referral or bonus promo code", apply: "Apply", lang: "Language:", nav_cases: "Cases", nav_profile: "Profile", empty: "Cases coming soon" }
    };

    function changeLang(lang) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(lang + '-btn').classList.add('active');
        document.querySelectorAll('.tr').forEach(el => {
            el.innerText = translations[lang][el.dataset.key];
        });
    }
</script>
</body>
</html>
