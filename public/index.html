<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CaseMonk</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f121d;
            --card-bg: rgba(255, 255, 255, 0.05);
            --modal-bg: #141829;
            --accent: #246bfd;
            --green: #4ade80;
            --text: #ffffff;
            --text-gray: #94a3b8;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
        }

        .header { display: flex; justify-content: flex-end; padding: 15px 20px; align-items: center; }
        .balance { background: var(--card-bg); padding: 8px 15px; border-radius: 20px; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.1); }
        .ton-icon { width: 14px; height: 14px; }

        .page { display: none; padding: 0 15px 120px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .profile-card { text-align: center; padding: 25px; background: var(--card-bg); border-radius: 24px; margin-top: 10px; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent); margin-bottom: 10px; }

        .page-title { text-align: center; font-size: 18px; font-weight: bold; margin: 20px 0; }

        .cases-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 400px; margin: 0 auto; }
        .case-tile {
            background: var(--card-bg); border-radius: 16px; padding: 15px; text-align: center;
            border: 1px solid rgba(255,255,255,0.05); cursor: pointer;
        }
        .case-tile img { width: 100%; max-width: 100px; margin-bottom: 8px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); }
        
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--modal-bg); border-radius: 24px; width: 100%; max-width: 400px;
            padding: 25px; border: 1px solid rgba(255,255,255,0.1); position: relative;
            max-height: 90vh; overflow-y: auto;
        }
        .modal-close { position: absolute; top: 15px; right: 15px; color: var(--text-gray); font-size: 20px; cursor: pointer; }
        .modal-main-img { width: 100px; display: block; margin: 0 auto 10px; }
        
        .controls-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 16px; margin: 20px 0; }
        .multi-select { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
        .multi-btn {
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05);
            color: white; padding: 6px 12px; border-radius: 10px; cursor: pointer; font-size: 13px;
        }
        .multi-btn.active { background: var(--accent); border-color: var(--accent); }

        .demo-toggle { display: flex; justify-content: space-between; align-items: center; color: var(--text-gray); font-size: 13px; }
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(14px); }

        .modal-item-list { display: flex; flex-direction: column; gap: 8px; }
        .modal-item {
            display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.1);
            padding: 8px 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.02);
        }
        .modal-item img { width: 35px; height: 35px; object-fit: contain; }
        .modal-item-info { flex-grow: 1; font-size: 13px; }
        .modal-item-price { color: var(--green); font-weight: bold; font-size: 13px; display: flex; align-items: center; gap: 3px; }

        .btn-main {
            background: var(--accent); color: white; border: none; width: 100%;
            padding: 16px; border-radius: 16px; font-weight: bold; font-size: 15px; margin-top: 15px;
        }

        #roulette-container {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; flex-direction: column; align-items: center; justify-content: center;
        }
        .roulette-window { width: 300px; height: 110px; border: 2px solid var(--accent); position: relative; overflow: hidden; border-radius: 15px; background: #0a0d16; }
        .roulette-rail { display: flex; position: absolute; left: 50%; transition: transform 9s cubic-bezier(0.1, 0, 0.1, 1); }
        .item-card { min-width: 90px; height: 90px; display: flex; align-items: center; justify-content: center; }
        .item-card img { width: 60px; height: 60px; object-fit: contain; }
        .pointer { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--green); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 10px var(--green); }

        .nav-bar {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(25, 30, 48, 0.9); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; padding: 12px;
            border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-item { text-align: center; color: var(--text-gray); text-decoration: none; font-size: 11px; flex: 1; }
        .nav-item.active { color: white; }
        .nav-item i { display: block; font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="header">
    <div class="balance">
        <img src="https://cryptologos.cc/logos/toncoin-ton-logo.png" class="ton-icon">
        <span id="u-bal">0.1</span>
    </div>
</div>

<div id="p-profile" class="page active">
    <div class="profile-card">
        <img id="u-avatar" class="avatar" src="">
        <h3 id="u-name" style="margin: 0;">Player</h3>
        <div id="u-handle" style="color: var(--text-gray); font-size: 14px;">@username</div>
    </div>
    <h3 style="margin-top: 30px;">Инвентарь</h3>
    <div id="inventory-list" style="color: var(--text-gray); text-align: center; margin-top: 20px;">
        Ваш инвентарь пуст
    </div>
</div>

<div id="p-cases" class="page">
    <div class="page-title">Уникальные</div>
    <div class="cases-grid">
        <div class="case-tile" onclick="openModal()">
            <img src="case_farm.png" alt="Farm">
            <div style="font-weight: 500; font-size: 13px;">Farm</div>
            <div style="color: var(--green); font-weight: bold; font-size: 13px;">1.5 TON</div>
        </div>
    </div>
</div>

<div id="case-modal" class="modal-overlay" onclick="if(event.target == this) closeModal()">
    <div class="modal">
        <i class="fa-solid fa-times modal-close" onclick="closeModal()"></i>
        <img src="case_farm.png" class="modal-main-img">
        <h2 style="text-align: center; margin: 0 0 15px;">Farm</h2>
        
        <div class="modal-item-list">
            <div class="modal-item">
                <img src="https://cdn.changes.tg/gifts/ice-cream.png">
                <div class="modal-item-info">Ice Cream Random</div>
                <div class="modal-item-price">2.83 <img src="https://cryptologos.cc/logos/toncoin-ton-logo.png" class="ton-icon"></div>
            </div>
            <div class="modal-item">
                <img src="https://cdn.changes.tg/gifts/fresh-socks.png">
                <div class="modal-item-info">Fresh Socks Random</div>
                <div class="modal-item-price">2.97 <img src="https://cryptologos.cc/logos/toncoin-ton-logo.png" class="ton-icon"></div>
            </div>
            <div class="modal-item">
                <img src="https://cdn.changes.tg/gifts/clover-pin.png">
                <div class="modal-item-info">Clover Pin Random</div>
                <div class="modal-item-price">3.74 <img src="https://cryptologos.cc/logos/toncoin-ton-logo.png" class="ton-icon"></div>
            </div>
            <div class="modal-item">
                <img src="ring.png">
                <div class="modal-item-info">Ring Random</div>
                <div class="modal-item-price">0.7 <img src="https://cryptologos.cc/logos/toncoin-ton-logo.png" class="ton-icon"></div>
            </div>
        </div>

        <div class="controls-box">
            <div class="multi-select">
                <button class="multi-btn active" onclick="setCount(1, this)">1</button>
                <button class="multi-btn" onclick="setCount(2, this)">2</button>
                <button class="multi-btn" onclick="setCount(3, this)">3</button>
                <button class="multi-btn" onclick="setCount(4, this)">4</button>
                <button class="multi-btn" onclick="setCount(5, this)">5</button>
            </div>
            <div class="demo-toggle">
                <span>Демо режим</span>
                <label class="switch">
                    <input type="checkbox" id="demo-switch">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <button id="btn-open-text" class="btn-main" onclick="startSpin()">Открыть за 1.5 TON</button>
    </div>
</div>

<div id="roulette-container">
    <div class="roulette-window">
        <div class="pointer"></div>
        <div id="rail" class="roulette-rail"></div>
    </div>
    <h3 id="spin-status" style="margin-top: 20px;">Крутим...</h3>
</div>

<div class="nav-bar">
    <a href="javascript:void(0)" class="nav-item" onclick="switchTab('cases', this)">
        <i class="fa-solid fa-shapes"></i><span>Кейсы</span>
    </a>
    <a href="javascript:void(0)" class="nav-item active" onclick="switchTab('profile', this)">
        <i class="fa-solid fa-user-circle"></i><span>Профиль</span>
    </a>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let balance = 0.1;
    let openCount = 1;
    let inventory = [];

    // Предметы с весами (шансами)
    const items = [
        { name: 'Ice Cream Random', price: 2.83, img: 'https://cdn.changes.tg/gifts/ice-cream.png', weight: 30 },
        { name: 'Fresh Socks Random', price: 2.97, img: 'https://cdn.changes.tg/gifts/fresh-socks.png', weight: 25 },
        { name: 'Clover Pin Random', price: 3.74, img: 'https://cdn.changes.tg/gifts/clover-pin.png', weight: 15 },
        { name: 'Ring Random', price: 0.7, img: 'ring.png', weight: 30 }
    ];

    function switchTab(p, el) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById('p-' + p).classList.add('active');
        el.classList.add('active');
    }

    function openModal() { document.getElementById('case-modal').classList.add('active'); }
    function closeModal() { document.getElementById('case-modal').classList.remove('active'); }

    function setCount(num, btn) {
        openCount = num;
        document.querySelectorAll('.multi-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('btn-open-text').innerText = `Открыть за ${(1.5 * num).toFixed(1)} TON`;
    }

    function getWeightedRandomItem() {
        let totalWeight = items.reduce((sum, item) => sum + item.weight, 0);
        let random = Math.random() * totalWeight;
        for (let item of items) {
            if (random < item.weight) return item;
            random -= item.weight;
        }
        return items[items.length - 1];
    }

    function startSpin() {
        const isDemo = document.getElementById('demo-switch').checked;
        const totalCost = 1.5 * openCount;

        if (!isDemo && balance < totalCost) { tg.showAlert("Недостаточно баланса!"); return; }
        closeModal();

        const rail = document.getElementById('rail');
        const container = document.getElementById('roulette-container');
        container.style.display = 'flex';
        rail.style.transition = 'none';
        rail.style.transform = 'translateX(0)';
        
        rail.innerHTML = '';
        // Генерируем 70 предметов для ленты
        for(let i=0; i<70; i++) {
            const r = items[Math.floor(Math.random() * items.length)];
            rail.innerHTML += `<div class="item-card"><img src="${r.img}"></div>`;
        }

        const win = getWeightedRandomItem();
        const winIdx = 60; // Индекс остановки
        rail.children[winIdx].innerHTML = `<img src="${win.img}">`;

        setTimeout(() => {
            rail.style.transition = 'transform 9s cubic-bezier(0.1, 0, 0.1, 1)';
            const stopPos = (winIdx * 90) + 45; 
            rail.style.transform = `translateX(-${stopPos}px)`;
        }, 100);

        setTimeout(() => {
            container.style.display = 'none';
            if(!isDemo) {
                balance -= totalCost;
                inventory.push(win);
                updateUI();
                tg.showAlert(`Вы выиграли: ${win.name}`);
            } else {
                tg.showAlert(`Демо-режим: выпало ${win.name}`);
            }
        }, 9500);
    }

    function updateUI() {
        document.getElementById('u-bal').innerText = balance.toFixed(2);
        const inv = document.getElementById('inventory-list');
        if (inventory.length > 0) {
            inv.style.display = 'grid';
            inv.style.gridTemplateColumns = '1fr 1fr';
            inv.style.gap = '10px';
            inv.innerHTML = inventory.map(i => `
                <div style="background:var(--card-bg);padding:15px;border-radius:15px;text-align:center;border:1px solid rgba(255,255,255,0.05);">
                    <img src="${i.img}" style="width:45px;margin-bottom:5px;">
                    <div style="font-size:12px;font-weight:500;">${i.name}</div>
                    <div style="color:var(--green);font-size:12px;margin-top:4px;">${i.price} TON</div>
                </div>
            `).join('');
        }
    }

    const user = tg.initDataUnsafe?.user;
    if (user) {
        document.getElementById('u-name').innerText = user.first_name;
        document.getElementById('u-handle').innerText = '@' + (user.username || 'user');
        if (user.photo_url) document.getElementById('u-avatar').src = user.photo_url;
    }
</script>
</body>
</html>
