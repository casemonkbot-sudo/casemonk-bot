<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CaseMint Bot | Открывай кейсы, получай скины</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Основной контейнер */
        .bot-container {
            max-width: 500px;
            width: 100%;
            background: rgba(18, 25, 45, 0.65);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* Шапка как у бота */
        .bot-header {
            padding: 20px 24px;
            background: rgba(10, 14, 23, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }

        .brand h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #F5E6B2, #D4AF37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .brand p {
            color: #7e8aa8;
            font-size: 0.75rem;
            margin-top: 4px;
        }

        .balance-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 40px;
            padding: 8px 16px;
            text-align: center;
            backdrop-filter: blur(4px);
        }

        .balance-label {
            font-size: 0.7rem;
            color: #9aa4bf;
        }

        .balance-amount {
            font-weight: bold;
            font-size: 1.4rem;
            color: #ffdf7e;
            letter-spacing: 1px;
        }

        /* панель статистики открытий */
        .stats-row {
            display: flex;
            justify-content: space-between;
            background: #0f1422cc;
            padding: 12px 20px;
            border-bottom: 1px solid #2a3348;
            font-size: 0.8rem;
            color: #b9c3e6;
        }

        /* Секция кейсов */
        .case-section {
            padding: 20px 20px 16px;
        }

        .case-grid {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 12px;
            scrollbar-width: thin;
        }

        .case-card {
            flex: 0 0 130px;
            background: linear-gradient(145deg, #131b2f, #0e1428);
            border-radius: 28px;
            padding: 16px 8px 14px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.2s;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 8px 18px rgba(0,0,0,0.3);
        }

        .case-card:hover {
            transform: translateY(-4px);
            border-color: #d4af37;
            box-shadow: 0 12px 25px rgba(0,0,0,0.5);
        }

        .case-icon {
            font-size: 3.2rem;
            filter: drop-shadow(0 4px 6px black);
        }

        .case-name {
            font-weight: bold;
            color: #ede6d5;
            margin: 8px 0 4px;
            font-size: 1rem;
        }

        .case-price {
            background: #00000066;
            border-radius: 40px;
            padding: 4px 8px;
            font-size: 0.8rem;
            color: #ffd966;
            font-weight: 600;
            display: inline-block;
        }

        /* Кнопка открытия */
        .open-btn-wrapper {
            padding: 8px 20px 24px;
        }

        .open-case-btn {
            width: 100%;
            background: linear-gradient(95deg, #f0b429, #e49322);
            border: none;
            padding: 16px 0;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.25rem;
            color: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 0 #8b5a1a;
            transform: translateY(-2px);
        }

        .open-case-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #8b5a1a;
        }

        .open-case-btn:disabled {
            opacity: 0.6;
            transform: translateY(0);
            cursor: not-allowed;
        }

        /* Анимация открытия / результат */
        .result-area {
            background: #070b14b3;
            margin: 8px 20px 20px;
            border-radius: 40px;
            padding: 16px 18px;
            backdrop-filter: blur(12px);
            text-align: center;
            border: 1px dashed #ffdf7e66;
            transition: all 0.2s;
        }

        .result-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #c9cfec;
            letter-spacing: 2px;
        }

        .result-item {
            font-size: 1.8rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 8px 0;
            color: #f5e6b2;
        }

        .rarity-badge {
            font-size: 0.7rem;
            background: #1e2a3e;
            padding: 4px 12px;
            border-radius: 50px;
            display: inline-block;
        }

        /* Инвентарь / история */
        .inventory-section {
            margin: 8px 20px 24px;
            background: #0a0f1c99;
            border-radius: 32px;
            padding: 16px;
        }

        .inventory-header {
            display: flex;
            justify-content: space-between;
            color: #ffdf9c;
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        .items-list {
            max-height: 240px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .inventory-item {
            background: #111827;
            border-radius: 60px;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            border-left: 4px solid #d4af37;
        }

        .item-name {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .item-value {
            color: #ffcd7e;
            font-weight: bold;
        }

        .empty-inv {
            text-align: center;
            color: #6b7293;
            padding: 24px;
        }

        button {
            background: none;
            border: none;
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
    </style>
</head>
<body>
<div class="bot-container" id="app">
    <div class="bot-header">
        <div class="brand">
            <h1>🎰 CASEMINT</h1>
            <p>как у @casemint_bot • открывай кейсы</p>
        </div>
        <div class="balance-card">
            <div class="balance-label">⚡ MINT COINS</div>
            <div class="balance-amount" id="balanceDisplay">1500</div>
        </div>
    </div>
    <div class="stats-row">
        <span>📦 Открыто кейсов: <strong id="totalOpened">0</strong></span>
        <span>🏆 Топ-дроп: <strong id="topDrop">—</strong></span>
    </div>

    <!-- Список кейсов -->
    <div class="case-section">
        <div class="case-grid" id="caseGrid">
            <!-- кейсы через js добавлю, но также продублирую статически для наглядности, но да будет из data -->
        </div>
    </div>

    <div class="open-btn-wrapper">
        <button class="open-case-btn" id="openCaseBtn">
            🎁 ОТКРЫТЬ КЕЙС 🎁
        </button>
    </div>

    <!-- Результат последнего открытия -->
    <div class="result-area" id="resultArea">
        <div class="result-title">ПОСЛЕДНЯЯ НАХОДКА</div>
        <div class="result-item" id="lastDropIcon">✨</div>
        <div id="lastDropName" class="rarity-badge" style="margin-top: 6px;">Нажми открыть</div>
    </div>

    <!-- Инвентарь (выбитые предметы) -->
    <div class="inventory-section">
        <div class="inventory-header">
            <span>📦 ИНВЕНТАРЬ (предметы)</span>
            <button id="clearInvBtn" style="color:#ffaa66; font-size:12px; cursor:pointer;">🗑️ очистить</button>
        </div>
        <div class="items-list" id="inventoryList">
            <div class="empty-inv">Пока пусто... открой первый кейс!</div>
        </div>
    </div>
</div>

<script>
    // -------- ДАННЫЕ как у кейс-бота (скины/предметы с весами и редкостями) ----------
    const CASES = [
        { 
            id: 0, name: "⭐ Стандартный", price: 100, icon: "📦", color: "#b9c3e6",
            items: [
                { name: "MP9 | Панцирь", value: 18, rarity: "Обычное", weight: 35, icon: "🔫" },
                { name: "P250 | Бенгальский", value: 22, rarity: "Обычное", weight: 30, icon: "🔫" },
                { name: "Galil AR | Каменный", value: 45, rarity: "Повышенное", weight: 18, icon: "🔫" },
                { name: "AWP | Паучий узор", value: 120, rarity: "Редкое", weight: 9, icon: "🎯" },
                { name: "★ Нож-бабочка", value: 450, rarity: "Легендарное", weight: 5, icon: "🔪" },
                { name: "Перчатки | Бронза", value: 310, rarity: "Мифическое", weight: 3, icon: "🧤" }
            ]
        },
        { 
            id: 1, name: "🔥 Премиум", price: 250, icon: "💎", color: "#ffbc6e",
            items: [
                { name: "AK-47 | Кровавая паутина", value: 85, rarity: "Повышенное", weight: 30, icon: "🔫" },
                { name: "M4A1-S | Золотая лихорадка", value: 145, rarity: "Редкое", weight: 25, icon: "🔫" },
                { name: "Desert Eagle | Кобра", value: 98, rarity: "Редкое", weight: 20, icon: "🐍" },
                { name: "★ Карамбит | Рубин", value: 890, rarity: "Легендарное", weight: 12, icon: "🔪" },
                { name: "Перчатки | Изумруд", value: 720, rarity: "Легендарное", weight: 8, icon: "🧤" },
                { name: "AWP | Медный дракон", value: 540, rarity: "Мифическое", weight: 5, icon: "🐉" }
            ]
        },
        { 
            id: 2, name: "👑 Vault Legend", price: 550, icon: "🏆", color: "#e4b363",
            items: [
                { name: "★ Талисман-меч", value: 1250, rarity: "Эксклюзив", weight: 20, icon: "⚔️" },
                { name: "M9 Bayonet | Лампа", value: 980, rarity: "Легендарное", weight: 28, icon: "🔪" },
                { name: "Перчатки | Тигр", value: 1150, rarity: "Легендарное", weight: 22, icon: "🐅" },
                { name: "AK-47 | Дикий лютик", value: 760, rarity: "Редкое", weight: 15, icon: "🌼" },
                { name: "★ Кинжал-сапфир", value: 2100, rarity: "Мифическое", weight: 10, icon: "🗡️" },
                { name: "AWP | Гидра", value: 890, rarity: "Легендарное", weight: 5, icon: "🐍" }
            ]
        }
    ];

    // ----- Состояние приложения -----
    let userBalance = 1500;           // начальный баланс MINT COINS
    let openedCasesCount = 0;
    let highestDropValue = 0;
    let inventory = [];               // массив объектов { name, value, rarity, icon, caseName? }
    let lastDrop = null;              // последний выпавший предмет

    // выбранный кейс по умолчанию (первый)
    let selectedCase = CASES[0];

    // DOM элементы
    const balanceSpan = document.getElementById('balanceDisplay');
    const totalOpenedSpan = document.getElementById('totalOpened');
    const topDropSpan = document.getElementById('topDrop');
    const openBtn = document.getElementById('openCaseBtn');
    const caseGridDiv = document.getElementById('caseGrid');
    const inventoryListDiv = document.getElementById('inventoryList');
    const lastDropIconSpan = document.getElementById('lastDropIcon');
    const lastDropNameSpan = document.getElementById('lastDropName');
    const clearInvBtn = document.getElementById('clearInvBtn');

    // Вспомогательная: ролл предмета по весам
    function rollItemFromCase(currentCase) {
        const items = currentCase.items;
        const totalWeight = items.reduce((sum, i) => sum + i.weight, 0);
        let rand = Math.random() * totalWeight;
        let accumulated = 0;
        for (let item of items) {
            accumulated += item.weight;
            if (rand <= accumulated) {
                return { ...item }; // копируем
            }
        }
        return { ...items[0] }; // fallback
    }

    // Обновление UI баланса, счётчиков
    function updateUI() {
        balanceSpan.innerText = Math.floor(userBalance);
        totalOpenedSpan.innerText = openedCasesCount;
        if (highestDropValue > 0) {
            topDropSpan.innerText = highestDropValue + " M";
        } else {
            topDropSpan.innerText = "—";
        }
        // включить/выключить кнопку в зависимости от баланса
        if (userBalance >= selectedCase.price) {
            openBtn.disabled = false;
        } else {
            openBtn.disabled = true;
        }
        renderInventory();
        renderLastDrop();
    }

    // отрисовка инвентаря
    function renderInventory() {
        if (!inventoryListDiv) return;
        if (inventory.length === 0) {
            inventoryListDiv.innerHTML = `<div class="empty-inv">🎲 Нет предметов. Открывайте кейсы!</div>`;
            return;
        }
        // показать последние 20 предметов, новые сверху (но обычно снизу, сделаем новые в начале)
        const reversedInv = [...inventory].reverse();
        const html = reversedInv.map(item => `
            <div class="inventory-item">
                <div class="item-name">
                    <span>${item.icon || '🎁'}</span> 
                    <span>${item.name}</span>
                    <span style="font-size:10px; background:#2a2f44; padding:2px 8px; border-radius:20px;">${item.rarity}</span>
                </div>
                <div class="item-value">${item.value} 🪙</div>
            </div>
        `).join('');
        inventoryListDiv.innerHTML = html;
    }

    function renderLastDrop() {
        if (lastDrop) {
            lastDropIconSpan.innerHTML = lastDrop.icon || '🎉';
            lastDropNameSpan.innerHTML = `${lastDrop.name} | ${lastDrop.rarity} (${lastDrop.value} M)`;
            lastDropNameSpan.style.background = "#e4932244";
            lastDropNameSpan.style.padding = "6px 12px";
            lastDropNameSpan.style.borderRadius = "40px";
        } else {
            lastDropIconSpan.innerHTML = '✨';
            lastDropNameSpan.innerHTML = 'Ещё не открывали';
            lastDropNameSpan.style.background = "#1e2a3e";
        }
    }

    // добавление предмета в инвентарь + обновление топдропа
    function addItemToInventory(item, caseName) {
        const itemWithCase = { ...item, caseOrigin: caseName, timestamp: Date.now() };
        inventory.unshift(itemWithCase); // добавляем в начало (свежее сверху)
        if (item.value > highestDropValue) {
            highestDropValue = item.value;
        }
        // Ограничим инвентарь до 50 предметов, чтобы не перегружать память/UI
        if (inventory.length > 50) inventory.pop();
        renderInventory();
    }

    // Открытие кейса (главная логика)
    function openCase() {
        if (userBalance < selectedCase.price) {
            // анимация ошибки
            const btn = openBtn;
            btn.style.transform = "translateY(2px)";
            setTimeout(() => { btn.style.transform = ""; }, 150);
            alert("❌ Недостаточно MINT COINS! Пополните баланс (демо-пополнение ниже или фарм)");
            return;
        }

        // списываем цену
        userBalance -= selectedCase.price;
        // увеличиваем счётчик открытий
        openedCasesCount++;

        // Роллим предмет
        const rolled = rollItemFromCase(selectedCase);
        // добавляем в инвентарь
        addItemToInventory(rolled, selectedCase.name);
        // запоминаем последний дроп
        lastDrop = rolled;
        
        // обновляем UI
        updateUI();
        
        // дополнительная анимация результата: подсветка и эффект
        const resultDiv = document.getElementById('resultArea');
        resultDiv.style.transition = "0.1s linear";
        resultDiv.style.backgroundColor = "#f7c56e22";
        setTimeout(() => { resultDiv.style.backgroundColor = ""; }, 200);
        
        // микровизуал - изменение баланса
        const balSpan = balanceSpan;
        balSpan.style.transform = "scale(1.1)";
        setTimeout(() => { balSpan.style.transform = ""; }, 200);
        
        // если выпал легендарный, можно дополнительно уведомление 
        if (rolled.rarity === "Легендарное" || rolled.rarity === "Мифическое" || rolled.rarity === "Эксклюзив") {
            const msg = `🌟 РЕДКОСТЬ! ${rolled.name} (${rolled.value} M) 🌟`;
            lastDropNameSpan.innerHTML = `🔥🔥 ${msg} 🔥🔥`;
            setTimeout(() => renderLastDrop(), 1800);
        }
    }

    // Очистка инвентаря
    function clearInventory() {
        if (confirm("Очистить весь инвентарь? Только предметы пропадут, баланс сохранится.")) {
            inventory = [];
            if (lastDrop && inventory.length === 0) {
                // можно оставить последний дроп, но по желанию сбросить? Оставим lastDrop в покое
            }
            renderInventory();
        }
    }

    // Пополнение (кнопка скрытой функции) — добавим не навязчиво по клику на баланс (секретно)
    function addDemoMoney() {
        userBalance += 500;
        updateUI();
        // всплывающий тост
        const balDiv = document.querySelector('.balance-card');
        const toast = document.createElement('div');
        toast.innerText = '+500 MINT COINS';
        toast.style.position = 'absolute';
        toast.style.background = '#d4af37';
        toast.style.color = '#000';
        toast.style.padding = '6px 14px';
        toast.style.borderRadius = '40px';
        toast.style.fontSize = '12px';
        toast.style.fontWeight = 'bold';
        toast.style.bottom = '70px';
        toast.style.right = '20px';
        toast.style.zIndex = '999';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1500);
    }

    // отображение списка кейсов с возможностью выбора
    function renderCases() {
        if (!caseGridDiv) return;
        caseGridDiv.innerHTML = CASES.map(c => `
            <div class="case-card" data-case-id="${c.id}" style="border-color: ${selectedCase && selectedCase.id === c.id ? '#ffdf7e' : 'rgba(212, 175, 55, 0.3)'}; background: ${selectedCase && selectedCase.id === c.id ? '#1e2a3f' : ''}">
                <div class="case-icon">${c.icon}</div>
                <div class="case-name">${c.name}</div>
                <div class="case-price">${c.price} 🪙</div>
            </div>
        `).join('');

        // добавить обработчики на каждую карточку
        document.querySelectorAll('.case-card').forEach(card => {
            card.addEventListener('click', (e) => {
                const id = parseInt(card.dataset.caseId);
                const newCase = CASES.find(c => c.id === id);
                if (newCase) {
                    selectedCase = newCase;
                    renderCases();    // перерисуем выделение
                    updateUI();       // обновим состояние кнопки (цена могла измениться)
                    // короткая вибрация интерфейса
                    card.style.transform = "scale(0.98)";
                    setTimeout(() => { card.style.transform = ""; }, 100);
                }
            });
        });
    }

    // загружаем дополнительный функционал: фарм монет (при клике на лого)
    function setupExtraFeatures() {
        // клик по балансу добавит монеты (демо)
        const balanceCardDiv = document.querySelector('.balance-card');
        if (balanceCardDiv) {
            balanceCardDiv.style.cursor = 'pointer';
            balanceCardDiv.addEventListener('click', (e) => {
                e.stopPropagation();
                addDemoMoney();
            });
        }
        // клик по заголовку тоже +300 (пасхалка)
        const brandDiv = document.querySelector('.brand h1');
        if (brandDiv) {
            brandDiv.addEventListener('click', () => {
                userBalance += 300;
                updateUI();
                const notif = document.createElement('div');
                notif.innerText = '🎁 +300 от создателя!';
                notif.style.cssText = 'position:fixed; bottom:30%; left:50%; transform:translateX(-50%); background:#000000aa; backdrop-filter: blur(8px); padding:8px 20px; border-radius: 40px; color:#ffd966; z-index:9999;';
                document.body.appendChild(notif);
                setTimeout(() => notif.remove(), 1000);
            });
        }
    }

    // Сохраняем состояние в localStorage для бекапа при перезагрузке (casual)
    function saveGameState() {
        const state = {
            balance: userBalance,
            openedCount: openedCasesCount,
            highestDrop: highestDropValue,
            inventory: inventory,
            lastDrop: lastDrop
        };
        localStorage.setItem('casemint_save', JSON.stringify(state));
    }

    function loadGameState() {
        const saved = localStorage.getItem('casemint_save');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                if (typeof data.balance === 'number') userBalance = data.balance;
                if (typeof data.openedCount === 'number') openedCasesCount = data.openedCount;
                if (typeof data.highestDrop === 'number') highestDropValue = data.highestDrop;
                if (Array.isArray(data.inventory)) inventory = data.inventory;
                if (data.lastDrop) lastDrop = data.lastDrop;
                updateUI();
            } catch(e) {}
        }
        // дефолт, если баланс 0 и инвентарь пуст но было норм
        if (userBalance === 0 && inventory.length === 0 && openedCasesCount === 0) {
            userBalance = 1500;
        }
        updateUI();
    }

    // автосохранение каждые 15 секунд
    setInterval(() => {
        saveGameState();
    }, 15000);
    
    // обработчики событий
    openBtn.addEventListener('click', () => {
        openCase();
        saveGameState();
    });
    if (clearInvBtn) {
        clearInvBtn.addEventListener('click', () => {
            clearInventory();
            saveGameState();
        });
    }

    // Инициализация
    function init() {
        loadGameState();
        renderCases();
        updateUI();
        setupExtraFeatures();
        // небольшой фикс для старта, проверим что баланс актуален для выбранного кейса
        if (userBalance < selectedCase.price) openBtn.disabled = true;
    }
    
    init();
</script>
</body>
</html>
