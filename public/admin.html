<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a2e; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #16213e; padding: 15px; border-radius: 15px; border: 1px solid #38bdf8; margin-bottom: 10px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #38bdf8; color: #1a1a2e; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>🛠 Панель Управления</h2>
    <div class="card">
        <label>Выдать баланс (TON):</label>
        <input type="number" id="bal" placeholder="0.0">
        <button onclick="save()">Применить ко всем</button>
    </div>
    <div class="card">
        <label>Шанс выпадения NFT (%):</label>
        <input type="range" min="1" max="100" value="15">
    </div>
    <button onclick="window.Telegram.WebApp.close()" style="background:#ff4757; margin-top:20px;">ВЫЙТИ</button>
    
    <script>
        function save() {
            window.Telegram.WebApp.showAlert("Настройки сохранены и применены!");
        }
    </script>
</body>
</html>
